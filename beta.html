<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bob's Orbit — Round &amp; Round Records</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--text:#E8E4DD;--dim:#6B6770;
  --accent:#E85D3F;--accent2:#4A9E8E;--accent3:#C4A44A;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none}
canvas{position:fixed;inset:0;z-index:0}

/* Orbiting nodes as HTML */
.orbit-node{position:fixed;z-index:1;pointer-events:auto;cursor:pointer;transition:transform .15s;text-align:center}
.orbit-node:hover{transform:scale(1.3);z-index:3}
.orbit-node .thumb{width:56px;height:56px;border-radius:50%;background:var(--surface,#1A1A1A);border:2px solid rgba(255,255,255,0.1);box-shadow:0 0 20px rgba(0,0,0,0.6),0 0 40px var(--node-glow,rgba(232,93,63,0.15));object-fit:cover;display:block;margin:0 auto}
.orbit-node .thumb.placeholder{background:linear-gradient(135deg,var(--accent),#C0392B);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;font-weight:800}
.orbit-node .label{font-size:0.58rem;color:var(--text);text-shadow:0 0 8px rgba(0,0,0,0.9);margin-top:3px;max-width:80px;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Center node */
.center-node{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;text-align:center}
.center-pulse{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(232,93,63,0.2),transparent 70%);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.5}50%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
.center-art{width:72px;height:72px;border-radius:50%;background:#111;box-shadow:0 0 40px rgba(232,93,63,0.4),0 0 80px rgba(232,93,63,0.1);position:relative;margin:0 auto}
.center-art img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.center-label-text{color:var(--text);font-size:0.9rem;font-weight:800;text-shadow:0 0 20px rgba(0,0,0,0.9);margin-top:8px;max-width:160px;line-height:1.2}

/* Bubble */
.bubble{position:fixed;z-index:2;max-width:300px;background:rgba(13,13,20,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 14px;font-size:0.78rem;line-height:1.5;color:var(--text);backdrop-filter:blur(12px);animation:fadeIn .4s ease;box-shadow:0 6px 24px rgba(0,0,0,0.5);pointer-events:auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bubble .spk{display:inline-flex;width:18px;height:18px;border-radius:50%;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:0.6rem;align-items:center;justify-content:center;vertical-align:middle;margin-left:3px;opacity:0.45;transition:all .15s}
.bubble .spk:hover,.bubble .spk.on{opacity:1;color:var(--accent2)}
.bubble .spk.on{animation:pulse 0.8s ease-in-out infinite}

/* Input */
.input-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:4;display:flex;gap:8px;background:rgba(13,13,20,0.9);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:6px 8px 6px 18px;backdrop-filter:blur(16px);width:90%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,0.4);transition:border-color .2s}
.input-bar:focus-within{border-color:var(--accent)}
.input-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:0.82rem;font-family:inherit;min-width:0}
.input-bar input::placeholder{color:var(--dim)}
.input-bar button{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;transition:all .15s}
.btn-send{background:var(--accent);color:#fff}
.btn-send:hover{background:#D14A30}
.btn-mic{background:rgba(255,255,255,0.06);color:var(--dim)}
.btn-mic:hover{color:var(--text)}
.btn-mic.on{background:var(--accent);color:#fff;animation:pulse 0.8s ease-in-out infinite}

/* Human ramp */
.human-ramp{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);z-index:3;font-size:0.62rem;color:var(--dim);cursor:pointer;padding:5px 14px;border-radius:12px;background:rgba(196,164,74,0.07);border:1px solid rgba(196,164,74,0.12);transition:all .2s;white-space:nowrap}
.human-ramp:hover{color:var(--text);background:rgba(196,164,74,0.14);border-color:rgba(196,164,74,0.3)}

/* Top bar */
.disclosure{position:fixed;top:0;left:0;right:0;z-index:3;background:rgba(5,5,8,0.88);border-bottom:1px solid rgba(255,255,255,0.05);padding:6px 16px;text-align:center;font-size:0.6rem;color:var(--dim);backdrop-filter:blur(12px);pointer-events:none}
.disclosure strong{color:var(--accent2)}
.brand{position:fixed;top:10px;left:14px;z-index:3;font-size:0.6rem;color:var(--dim);letter-spacing:0.8px;font-weight:700;pointer-events:none}

@media(max-width:600px){
  .center-art{width:56px;height:56px}
  .center-pulse{width:80px;height:80px}
  .center-label-text{font-size:0.72rem;max-width:120px}
  .orbit-node .thumb{width:42px;height:42px}
  .orbit-node .label{font-size:0.5rem;max-width:60px}
  .bubble{max-width:240px;font-size:0.7rem;padding:8px 12px}
  .input-bar{padding:5px 6px 5px 14px;width:calc(100vw - 24px)}
  .human-ramp{bottom:62px}
}
</style>
</head>
<body>

<div class="disclosure">&#129302; Bob is an AI chatbot — not a real person. Memory stays on your device. <strong>Never on a server.</strong></div>
<div class="brand">ROUND &amp; ROUND RECORDS</div>

<canvas id="web"></canvas>

<div class="center-node" id="centerNode">
  <div class="center-pulse"></div>
  <div class="center-art" id="centerArt"><div class="center-label"></div></div>
  <div class="center-label-text" id="centerLabel">Bob</div>
</div>

<div id="orbitContainer"></div>
<div id="bubbleContainer"></div>

<div class="input-bar">
  <input id="betaInput" placeholder="Tell Bob about an artist or genre..." autofocus>
  <button class="btn-mic" id="betaMic" aria-label="Voice">&#127908;</button>
  <button class="btn-send" id="betaSend" aria-label="Send">&#8594;</button>
</div>

<div class="human-ramp" onclick="betaChat('human')">&#128100; Prefer a real human? Click here</div>

<script src="config.js"></script>
<script>
(function(){
"use strict";
var API_PROXY="https://rr-records-proxy.dan-m-kelly.workers.dev";
(function(){if(typeof LLM_KEY==="undefined")window.LLM_KEY="";if(typeof LFM_KEY==="undefined")window.LFM_KEY="";if(typeof DGS_KEY==="undefined")window.DGS_KEY="";if(API_PROXY){window.LLM_KEY="proxy";window.LLM_URL="proxy";window.LLM_MODEL="deepseek-chat";window.LFM_KEY="proxy";window.DGS_KEY="proxy"}})();

var conv=[],artistName="";
var expectingName=false,spokeLast=false;
var bobMemory={visits:0,lastVisit:"",recentArtists:[],recentGenres:[],totalSearches:0,userName:""};
var input=document.getElementById("betaInput");
var centerLabel=document.getElementById("centerLabel");
var centerArt=document.getElementById("centerArt");
var orbitContainer=document.getElementById("orbitContainer");
var bubbleContainer=document.getElementById("bubbleContainer");
var orbitNodes=[],orbitEls=[],lastSearch="";

// Canvas web
var canvas=document.getElementById("web"),ctx=canvas.getContext("2d"),w,h;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
resize();window.addEventListener("resize",resize);

var stars=[];for(var i=0;i<150;i++)stars.push({x:Math.random(),y:Math.random(),z:Math.random()*0.6+0.2,r:Math.random()*1.2+0.4,sp:Math.random()*0.0003+0.0001});

var GENRE_PALETTE=["#E85D3F","#C4A44A","#4A9E8E","#7B68EE","#DC143C","#FF8C00","#00CED1","#9370DB","#3CB371","#FF69B4"];

// Pie sections: Albums (top-right), Artists (bottom-right), Genres (bottom-left), Chat (top-left)
var SECTION_ALBUMS={start:0, end:Math.PI/2, label:"ALBUMS", color:"#E85D3F"};
var SECTION_ARTISTS={start:Math.PI/2, end:Math.PI, label:"ARTISTS", color:"#4A9E8E"};
var SECTION_GENRES={start:Math.PI, end:Math.PI*3/2, label:"GENRES", color:"#C4A44A"};
var SECTION_CHAT={start:Math.PI*3/2, end:Math.PI*2, label:"CHAT", color:"#7B68EE"};

var pieNodes=[]; // [{angle, radius, sectionIdx}]

function nodeXY(n){var cx=w/2,cy=h/2;return{x:cx+Math.cos(n.angle)*n.radius,y:cy+Math.sin(n.angle)*n.radius}}

function draw(){
  ctx.clearRect(0,0,w,h);
  var cx=w/2,cy=h/2,maxR=Math.min(w,h)*0.42;

  // Dividing lines — 4 quadrants
  [SECTION_ALBUMS,SECTION_ARTISTS,SECTION_GENRES,SECTION_CHAT].forEach(function(sec,i){
    [sec.start,sec.end].forEach(function(a){
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*maxR,cy+Math.sin(a)*maxR);
      ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;ctx.stroke();
    });
    var ma=sec.start+(sec.end-sec.start)/2;
    var lx=cx+Math.cos(ma)*(maxR+28),ly=cy+Math.sin(ma)*(maxR+28);
    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.font="9px Inter,system-ui";ctx.textAlign="center";
    ctx.fillText(sec.label,lx,ly);
  });

  // Web lines to each node
  pieNodes.forEach(function(n){
    var p=nodeXY(n);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);
    ctx.strokeStyle="rgba(255,255,255,0.05)";ctx.lineWidth=0.5;ctx.stroke();
    // Node dot
    ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.4)";ctx.fill();
  });

  stars.forEach(function(s){
    var px=cx+(s.x-0.5)*w,py=cy+(s.y-0.5)*h;
    var a=s.z*0.5;ctx.beginPath();ctx.arc(px,py,s.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,"+a+")";ctx.fill();
    s.y+=s.sp;if(s.y>1)s.y=0;if(s.y<0)s.y=1;
  });
  requestAnimationFrame(draw);
}
draw();

function positionPieNodes(){
  var cx=w/2,cy=h/2,maxR=Math.min(w,h)*0.40;
  orbitEls.forEach(function(el,i){
    var n=pieNodes[i];if(!n)return;
    var p=nodeXY(n);
    el.style.left=(p.x-el.offsetWidth/2)+"px";el.style.top=(p.y-el.offsetHeight/2)+"px";
  });
  requestAnimationFrame(positionPieNodes);
}
positionPieNodes();

function spreadInArc(sec,count,index,minR,maxR){
  if(count<=1)return sec.start+(sec.end-sec.start)/2;
  return sec.start+(sec.end-sec.start)*(index/(count-1));
}

function setPieData(albums,artists,genres,chatTexts){
  // chatTexts: array of strings to display in the chat quadrant
  orbitContainer.innerHTML="";pieNodes=[];orbitEls=[];
  var minR=Math.min(w,h)*0.14,maxR=Math.min(w,h)*0.39;

  function addSection(items,sec){
    items.forEach(function(item,i){
      var fraction=items.length>1?i/(items.length-1):0.5;
      var angle=spreadInArc(sec,items.length,i,0,0);
      var radius=minR+fraction*(maxR-minR);
      pieNodes.push({angle:angle,radius:radius});

      var el=document.createElement("div");el.className="orbit-node";
      var palColor=GENRE_PALETTE[i%GENRE_PALETTE.length];
      if(item.img){
        el.innerHTML='<img class="thumb" src="'+item.img+'" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'+'<div class="thumb placeholder" style="display:none;background:'+palColor+'">'+item.label.charAt(0).toUpperCase()+'</div>';
      }else{
        el.innerHTML='<div class="thumb placeholder" style="background:'+palColor+'">'+item.label.charAt(0).toUpperCase()+'</div>';
      }
      el.innerHTML+='<div class="label">'+esc(item.label)+'</div>';
      el.style.setProperty("--node-glow",palColor.replace(")","")+",0.3)");
      el.onclick=function(){betaChat(item.label)};
      orbitContainer.appendChild(el);
      orbitEls.push(el);
    });
  }

  // Chat quadrant: show text bubbles
  if(chatTexts&&chatTexts.length){
    chatTexts.forEach(function(txt,i){
      var fraction=chatTexts.length>1?i/(chatTexts.length-1):0.5;
      var angle=spreadInArc(SECTION_CHAT,chatTexts.length,i,0,0);
      var radius=minR+fraction*(maxR-minR)*0.9;
      pieNodes.push({angle:angle,radius:radius});

      var el=document.createElement("div");el.className="orbit-node";
      el.innerHTML='<div class="thumb placeholder" style="background:#7B68EE;width:auto;height:auto;padding:8px 10px;border-radius:10px;font-size:0.62rem;max-width:120px;text-align:left;line-height:1.35">'+esc(txt.slice(0,120))+(txt.length>120?"…":"")+'</div>';
      el.style.cursor="default";
      orbitContainer.appendChild(el);
      orbitEls.push(el);
    });
  }

  if(albums.length)addSection(albums,SECTION_ALBUMS);
  if(artists.length)addSection(artists,SECTION_ARTISTS);
  if(genres.length)addSection(genres,SECTION_GENRES);
}

// === Memory ===
function loadMemory(){
  try{var r=localStorage.getItem("bob_beta_memory");if(r){var p=JSON.parse(r);bobMemory=p}}catch(e){}
  bobMemory.visits=(bobMemory.visits||0)+1;bobMemory.lastVisit=new Date().toISOString();
  bobMemory.recentArtists=bobMemory.recentArtists||[];bobMemory.recentGenres=bobMemory.recentGenres||[];
  bobMemory.totalSearches=bobMemory.totalSearches||0;bobMemory.userName=bobMemory.userName||"";
  expectingName=!bobMemory.userName;saveMemory();
}
function saveMemory(){try{localStorage.setItem("bob_beta_memory",JSON.stringify(bobMemory))}catch(e){}}
function rememberArtist(a){
  if(!a)return;var ix=bobMemory.recentArtists.indexOf(a);
  if(ix>-1)bobMemory.recentArtists.splice(ix,1);bobMemory.recentArtists.unshift(a);
  if(bobMemory.recentArtists.length>10)bobMemory.recentArtists.pop();bobMemory.totalSearches++;saveMemory();
}
function getPreamble(){
  var p=[];if(bobMemory.userName)p.push("User's name is "+bobMemory.userName+". Use it now and then.");
  if(bobMemory.visits>1)p.push("Visit #"+bobMemory.visits+". We've chatted before.");
  if(bobMemory.recentArtists.length)p.push("Past searches: "+bobMemory.recentArtists.slice(0,5).join(", "));
  return p.length?"[Returning customer] "+p.join(" ")+" ":"";
}

// === Bubbles ===
function showBubble(txt){
  var d=document.createElement("div");d.className="bubble";
  d.innerHTML='<div>'+txt+'</div>'+'<button class="spk" onclick="betaSpeak(this)" title="Listen">&#128266;</button>';
  d.style.top=(15+Math.random()*25)+"%";
  d.style[Math.random()>0.5?"left":"right"]=(5+Math.random()*15)+"%";
  d.addEventListener("dblclick",function(){this.remove()});
  bubbleContainer.appendChild(d);
  if(bubbleContainer.children.length>8)bubbleContainer.firstChild.remove();
  setTimeout(function(){if(d.parentNode&&bubbleContainer.children.length>3)d.remove()},18000);
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// === TTS ===
window.betaSpeak=function(btn){
  var s=window.speechSynthesis;
  if(s.speaking){s.cancel();document.querySelectorAll(".spk.on").forEach(function(b){b.classList.remove("on")});return}
  var txt=(btn.parentElement.textContent||"").replace(/[🎵🔊]/g,"").trim();
  document.querySelectorAll(".spk.on").forEach(function(b){b.classList.remove("on")});btn.classList.add("on");
  function speak(t){
    var u=new SpeechSynthesisUtterance(t);u.lang="en-IE";u.rate=1;u.pitch=1;
    var voices=s.getVoices();
    if(voices.length){
      var en=voices.filter(function(v){return v.lang.indexOf("en")===0});
      var fem=["female","moira","fiona","zira","samantha","karen"];
      en=en.filter(function(v){var n=v.name.toLowerCase();return !fem.some(function(f){return n.indexOf(f)>-1})});
      if(!en.length)en=voices.filter(function(v){return v.lang.indexOf("en")===0});
      var best=null;en.forEach(function(v){var sc=3;if(v.lang==="en-IE")sc=10;else if(v.lang==="en-GB")sc=7;if(!best||sc>best._score){v._score=sc;best=v}});
      u.voice=best||voices[0];
    }
    u.onend=function(){btn.classList.remove("on")};u.onerror=function(){btn.classList.remove("on")};s.speak(u);
  }
  if(s.getVoices().length===0){s.onvoiceschanged=function(){s.onvoiceschanged=null;speak(txt)}}else speak(txt);
};

// === STT ===
var micBtn=document.getElementById("betaMic"),recognition=null;
if("webkitSpeechRecognition" in window||"SpeechRecognition" in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang="en-IE";
  recognition.onresult=function(e){
    var t="";for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;
    input.value=t;if(e.results[0].isFinal){micBtn.classList.remove("on");spokeLast=true;send()}
  };
  recognition.onerror=function(){micBtn.classList.remove("on")};
  recognition.onend=function(){micBtn.classList.remove("on")};
}
if(!recognition)micBtn.style.display="none";
micBtn.onclick=function(){
  if(!recognition)return;
  if(micBtn.classList.contains("on")){recognition.stop();micBtn.classList.remove("on")}
  else{try{recognition.start();micBtn.classList.add("on")}catch(e){}}
};

// === API ===
function lfm(p){var u=API_PROXY?API_PROXY+"/api/lastfm?"+p:"https://ws.audioscrobbler.com/2.0/?api_key="+LFM_KEY+"&format=json&"+p;return fetch(u).then(function(r){return r.ok?r.json():null}).catch(function(){return null})}
async function getSim(a){if(!LFM_KEY)return[];var d=await lfm("method=artist.getsimilar&artist="+encodeURIComponent(a)+"&limit=10");return(d&&d.similarartists&&d.similarartists.artist)?d.similarartists.artist.map(function(x){var m=parseFloat(x.match);return{name:x.name,match:m<=1?Math.round(m*100):Math.round(m)}}):[]}
async function getAlb(a){if(!LFM_KEY)return[];var d=await lfm("method=artist.gettopalbums&artist="+encodeURIComponent(a)+"&limit=12");if(!d||!d.topalbums||!d.topalbums.album)return[];return d.topalbums.album.map(function(x){var img="";if(x.image){for(var i=x.image.length-1;i>=0;i--){if(x.image[i]["#text"]){img=x.image[i]["#text"];break}}}return{name:x.name,artist:x.artist?x.artist.name:a,playcount:parseInt(x.playcount)||0,img:img}})}
async function getBio(a){if(!LFM_KEY)return null;var d=await lfm("method=artist.getinfo&artist="+encodeURIComponent(a));if(!d||!d.artist)return null;var bio=(d.artist.bio&&d.artist.bio.summary)?d.artist.bio.summary.replace(/<[^>]+>/g,"").replace(/<a[^>]*>.*?read more.*?<\/a>/gi,"").replace(/read more on last\.fm\.?/i,"").trim().slice(0,400):"";return{name:d.artist.name,bio:bio,listeners:d.artist.stats?d.artist.stats.listeners:"",playcount:d.artist.stats?d.artist.stats.playcount:""}}
async function getTgs(a){if(!LFM_KEY)return[];var d=await lfm("method=artist.gettoptags&artist="+encodeURIComponent(a)+"&limit=10");return(d&&d.toptags&&d.toptags.tag)?d.toptags.tag.map(function(x){return{name:x.name,count:parseInt(x.count)}}):[]}
async function getArtistImg(a){if(!LFM_KEY)return null;var d=await lfm("method=artist.getinfo&artist="+encodeURIComponent(a));if(!d||!d.artist||!d.artist.image)return null;for(var i=d.artist.image.length-1;i>=0;i--){if(d.artist.image[i]["#text"])return d.artist.image[i]["#text"]}return null}

// === LLM ===
var BOB_VOICE_BASE="You are Bob, an AI chatbot music guide at Round & Round Records, a small indie record shop in Dublin (est. 2005). You know band histories, album lore, and genre connections. Dublin flavour: use 'grand','deadly','class','sound','craic'. Keep it 1-3 sentences. Never list data. No em dashes, no markdown. You ARE a bot — never pretend to be human.";
async function chatLLM(msg){
  if(!LLM_KEY)return null;
  var msgs=[{role:"system",content:getPreamble()+BOB_VOICE_BASE}];
  for(var i=0;i<conv.length;i++)msgs.push(conv[i]);msgs.push({role:"user",content:msg});
  try{
    var u=API_PROXY?API_PROXY+"/api/llm":(LLM_URL||"https://api.deepseek.com/v1/chat/completions");
    var o={method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:LLM_MODEL||"deepseek-chat",messages:msgs,temperature:0.9,max_tokens:300})};
    if(!API_PROXY)o.headers.Authorization="Bearer "+LLM_KEY;
    var r=await fetch(u,o);if(!r.ok)return null;
    var d=await r.json();var reply=d.choices[0].message.content.trim();
    conv.push({role:"user",content:msg});conv.push({role:"assistant",content:reply});if(conv.length>16)conv=conv.slice(-16);
    return reply;
  }catch(e){return null}
}

// === Gibberish ===
function isGibberish(txt){
  if(txt.length<2)return true;
  var c=txt.replace(/[^a-zA-Z]/g,'').toLowerCase();
  if(/^[^a-zA-Z0-9\s]{3,}$/.test(txt))return true;
  if(/(.)\1{4,}/.test(txt))return true;
  if(c.length<2&&txt.length>2)return true;
  if(/^(asdf|qwer|zxcv|uiop|hjkl)/i.test(c))return true;
  if(/^(yes|no|ok|okay|yeah|yep|nope|maybe|sure|idk|dunno|hello|hi|hey|thanks|thx|ty|bye|cya|lol|haha|hehe|what|why|when|who|how|help|test|testing)$/i.test(txt))return true;
  if(txt.split(/\s+/).length===1&&txt.length<5&&!/^[A-Z]/.test(txt))return true;
  if(c.length>=4&&!/^[A-Z]{2,6}$/.test(txt.trim())){var v=c.match(/[aeiou]/g);var vc=v?v.length:0;if(vc===0||(c.length-vc)/vc>3)return true}
  return false;
}

// === Send ===
window.betaChat=function(t){input.value=t;send()};
var lastSearchedArtist="";

async function send(){
  var txt=input.value.trim();if(!txt)return;input.value="";

  if(txt==="CLS"){localStorage.removeItem("bob_beta_memory");bobMemory={visits:0,lastVisit:"",recentArtists:[],recentGenres:[],totalSearches:0,userName:""};expectingName=true;centerLabel.textContent="Bob";setPieData(DEFAULT_ALBUMS,DEFAULT_ARTISTS,DEFAULT_GENRES,DEFAULT_CHAT);showBubble("All clear! Fresh start.");return}

  showBubble(esc(txt));

  if(expectingName&&!bobMemory.userName){
    var name=txt.replace(/^(i'm|i am|my name is|call me|it's|name's)\s+/i,"").replace(/[.!?,]$/,"").trim();
    if(name&&name.split(/\s+/).length<=3&&name.length>=2){bobMemory.userName=name;expectingName=false;saveMemory();centerLabel.textContent=name;showBubble("Class, nice to meet you <strong>"+esc(name)+"</strong>! What are you into?");setPieData(DEFAULT_ALBUMS,DEFAULT_ARTISTS,DEFAULT_GENRES,DEFAULT_CHAT);return}
  }

  if(isGibberish(txt)){showBubble("Didn't quite catch that! Give me an artist or genre.");setPieData(DEFAULT_ALBUMS,DEFAULT_ARTISTS,DEFAULT_GENRES,DEFAULT_CHAT);return}
  if(txt.toLowerCase()==="human"){showBubble("Round &amp; Round Records, 32 Main Street, Dublin. Phone: +353 1 671 1711. Email: hello@roundandroundrecords.ie. Mon-Sat 10-6, Sun 12-5.");showBubble("Anything else I can help with?");return}

  var llmReply=null;
  if(LLM_KEY&&LLM_MODEL)llmReply=await chatLLM(txt);
  if(llmReply)showBubble(llmReply);

    var artists=extractArtists(txt);
  if(artists.length){
    var an=artists[0];
    var sim=await getSim(an),albs=await getAlb(an),tgs=await getTgs(an),bio=await getBio(an),artImg=await getArtistImg(an);
    artistName=an;lastSearch=an;lastSearchedArtist=an;rememberArtist(an);
    centerLabel.textContent=artistName.charAt(0).toUpperCase()+artistName.slice(1);

    if(artImg)centerArt.innerHTML='<img src="'+artImg+'" alt="" onerror="this.style.display=\'none\'">';

    // Build pie data — 4 sections
    var pieAlbums=[],pieArtists=[],pieGenres=[],pieChat=[];
    if(albs.length)pieAlbums=albs.slice(0,8).map(function(a){return{label:a.name,img:a.img||null}});
    if(sim.length)pieArtists=sim.slice(0,6).map(function(s){return{label:s.name}});
    if(tgs.length)pieGenres=tgs.slice(0,6).map(function(t){return{label:t.name}});
    if(llmReply)pieChat=[llmReply];
    if(bio&&bio.bio)pieChat.push(bio.bio.slice(0,200));
    setPieData(pieAlbums,pieArtists,pieGenres,pieChat);

    if(bio&&bio.bio)showBubble("<strong>"+esc(artistName.charAt(0).toUpperCase()+artistName.slice(1))+"</strong>: "+esc(bio.bio.slice(0,250))+(bio.bio.length>250?"…":""));
    if(albs.length)showBubble("Top albums: "+albs.slice(0,4).map(function(a){return'<a href="https://www.discogs.com/search/?q='+encodeURIComponent(a.artist+" "+a.name)+'&type=release" target="_blank" style="color:var(--accent2)">'+esc(a.name)+'</a>'}).join(", "));
  }
  if(!artists.length&&!llmReply)showBubble("Try an artist name or genre — I'll find you something!");
}

function extractArtists(txt){
  var t=txt.toLowerCase().replace(/[.,!?;:'"()]/g," ").trim();
  t=t.replace(/^(i am |we are |i |we )(really |kinda |sort of |pretty |absolutely |so |super )?(into |a fan of |loving |enjoying |listening to |liking |digging )/i,"");
  t=t.replace(/^(what('s| is) (similar to|like) |suggest |recommend |find me |show me |search for |tell me about |give me |i like |i love |i enjoy )/i,"");
  var parts=t.split(/\s+(?:and|or)\s+|,\s*/);var results=[];
  parts.forEach(function(p){
    var w=p.trim().split(/\s+/).filter(function(x){return x.length>1&&!/^(the|and|or|but|for|nor|yet|so|in|on|at|to|by|from|with|about|into|upon|over|under|also|get|got|has|had|been|was|were|are|its|not|very|much|well|even|still|always|never|long|time|favorite|favourite|thing|things|stuff|way|lot|lots|bit|kind|sort)$/i.test(x)});
    if(w.length>=1)results.push(w.slice(0,3).join(" "));
  });
  return results.filter(function(r){return r&&r.length>=2});
}

      if(!bobMemory.userName){showBubble("What's your name? (Just on your device, nowhere else)");expectingName=true}
    },4200);
  }
})();
})();
