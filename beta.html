<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bob's Orbit — Round &amp; Round Records</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--text:#E8E4DD;--dim:#6B6770;
  --accent:#E85D3F;--accent2:#4A9E8E;--accent3:#C4A44A;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --albums-bg:rgba(232,93,63,0.04);--artists-bg:rgba(74,158,142,0.04);--genres-bg:rgba(196,164,74,0.04);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;display:flex}
canvas{position:fixed;inset:0;z-index:5;pointer-events:none}

/* Chat pane — left */
.chat-pane{width:360px;flex-shrink:0;display:flex;flex-direction:column;background:rgba(8,8,16,0.95);border-right:1px solid rgba(255,255,255,0.06);z-index:2;position:relative}
.chat-top{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-top-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#C0392B);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;flex-shrink:0}
.chat-top-info h2{font-size:0.85rem;font-weight:600;color:var(--text)}.chat-top-info span{font-size:0.6rem;color:var(--dim)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{max-width:90%;line-height:1.45;animation:fadeIn .3s ease}.msg.bot{align-self:flex-start}.msg.user{align-self:flex-end}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:0.78rem}.msg.bot .msg-bubble{background:rgba(255,255,255,0.05);color:var(--text);border-bottom-left-radius:4px}.msg.user .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-speak{display:inline-flex;width:18px;height:18px;border-radius:50%;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:0.6rem;align-items:center;justify-content:center;vertical-align:middle;margin-left:3px;opacity:0.45;transition:all .15s}
.msg-speak:hover,.msg-speak.on{opacity:1;color:var(--accent2)}.msg-speak.on{animation:pulse 0.8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.15);opacity:1}}
.msg-meta{font-size:0.55rem;color:var(--dim);margin-top:2px;padding:0 4px}.msg.user .msg-meta{text-align:right}
.chat-input-wrap{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:8px 14px;font-size:0.8rem;outline:none;color:var(--text);font-family:inherit}.chat-input::placeholder{color:var(--dim)}.chat-input:focus{border-color:var(--accent)}
.chat-send{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;transition:all .15s}.chat-send:hover{background:#D14A30}
.chat-mic{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid rgba(255,255,255,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0}.chat-mic.on{background:var(--accent);color:#fff;border-color:var(--accent);animation:pulse 0.8s ease-in-out infinite}
.chat-human{padding:8px 14px;text-align:center;font-size:0.62rem;color:var(--dim);cursor:pointer;border-top:1px solid rgba(196,164,74,0.1);background:rgba(196,164,74,0.03);flex-shrink:0}.chat-human:hover{color:var(--text);background:rgba(196,164,74,0.08)}

/* Discovery area — right */
.disc-area{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.disc-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:rgba(255,255,255,0.06);position:relative;z-index:1}
.disc-section{padding:10px;overflow-y:auto;position:relative}
.disc-section.albums{background:var(--albums-bg)}
.disc-section.artists{background:var(--artists-bg)}
.disc-section.genres{background:var(--genres-bg)}
.section-label{font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:8px;position:sticky;top:0;z-index:1;background:inherit;padding:2px 0}

/* Album tile grid — auto-fit fills available space */
.album-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;align-content:start}
.album-tile{text-align:center;cursor:pointer;transition:transform .15s;display:flex;flex-direction:column;align-items:center}.album-tile:hover{transform:translateY(-2px)}
.album-tile .at-img{border-radius:6px;object-fit:cover;display:block;width:100%;aspect-ratio:1;border:2px solid rgba(255,255,255,0.08)}.album-tile .at-placeholder{border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;width:100%;aspect-ratio:1}
.album-tile .at-label{font-size:0.52rem;color:var(--text);margin-top:3px;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;width:100%}
.album-tile .at-badges{display:flex;gap:3px;margin-top:3px;width:100%;justify-content:center}
.at-badge{padding:2px 6px;border-radius:4px;font-size:0.45rem;font-weight:700;text-transform:uppercase;letter-spacing:0.2px;cursor:pointer;transition:all .15s;border:1px solid transparent;text-decoration:none;display:inline-block}
.at-badge-order{background:rgba(196,164,74,0.15);color:var(--accent3);border-color:rgba(196,164,74,0.3)}.at-badge-order:hover{background:var(--accent3);color:#fff}
.at-badge-discogs{background:rgba(255,255,255,0.05);color:var(--dim);border-color:rgba(255,255,255,0.08)}.at-badge-discogs:hover{background:rgba(255,255,255,0.12);color:#fff}

/* Artist card grid */
.artist-grid{display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start}
.artist-card{width:calc(50% - 4px);display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}.artist-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1)}
.artist-card .ac-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#fff;font-weight:700;flex-shrink:0}
.artist-card .ac-info{min-width:0}.artist-card .ac-name{font-size:0.72rem;font-weight:600;color:var(--text);line-height:1.2}.artist-card .ac-match{font-size:0.58rem;color:var(--accent3)}

/* Genre chips */
.genre-cloud{display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start}
.genre-chip{padding:5px 11px;border-radius:14px;font-size:0.63rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid rgba(255,255,255,0.05);transition:all .15s;letter-spacing:0.2px}.genre-chip:hover{background:rgba(74,158,142,0.2);color:var(--accent2);border-color:rgba(74,158,142,0.3)}

/* Center hero — just the image, perfectly centered */
.hero-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;pointer-events:none}
.hero-img{width:204px;height:204px;border-radius:50%;object-fit:cover;display:block;box-shadow:0 0 40px rgba(232,93,63,0.25),0 0 80px rgba(232,93,63,0.08);border:3px solid rgba(232,93,63,0.3)}.hero-img.placeholder{background:#111;display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--accent)}

/* Top bar */
.disclosure{position:fixed;top:0;left:0;right:0;z-index:10;background:rgba(5,5,8,0.9);border-bottom:1px solid rgba(255,255,255,0.05);padding:5px 14px;text-align:center;font-size:0.55rem;color:var(--dim);backdrop-filter:blur(12px);pointer-events:none}.disclosure strong{color:var(--accent2)}

@media(max-width:768px){
  body{flex-direction:column}
  .chat-pane{width:100%;height:50%;flex-shrink:1}
  .disc-area{height:50%}
  .disc-grid{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
  .hero-img{width:120px;height:120px}
  .artist-card .ac-av{width:28px;height:28px}.artist-card .ac-name{font-size:0.62rem}
}
</style>
</head>
<body>

<div class="disclosure">&#129302; Bob is an AI chatbot — not a real person. Memory stays on your device. <strong>Never on a server.</strong></div>

<canvas id="web"></canvas>

<!-- Chat pane -->
<div class="chat-pane">
  <div class="chat-top">
    <div class="chat-top-avatar">&#127926;</div>
    <div class="chat-top-info"><h2>Bob</h2><span id="bobLabel">Music guide · AI-powered</span></div>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-human" onclick="betaChat('human')">&#128100; Prefer a real human? Click here for our details</div>
  <div class="chat-input-wrap">
    <button class="chat-mic" id="betaMic" aria-label="Voice">&#127908;</button>
    <input class="chat-input" id="betaInput" placeholder="Tell Bob about an artist or genre..." autofocus>
    <button class="chat-send" id="betaSend" aria-label="Send">&#8594;</button>
  </div>
</div>

<!-- Discovery area -->
<div class="disc-area" id="discArea">
  <div class="disc-grid">
    <div class="disc-section albums">
      <div class="section-label">Albums</div>
      <div class="album-grid" id="albumsContent"></div>
    </div>
    <div class="disc-section artists">
      <div class="section-label">Related Artists</div>
      <div class="artist-grid" id="artistsContent"></div>
    </div>
    <div class="disc-section genres">
      <div class="section-label">Genres</div>
      <div class="genre-cloud" id="genresContent"></div>
    </div>
    <div class="disc-section genres" style="background:rgba(123,104,238,0.04)">
      <div class="section-label">Artist Information</div>
      <div id="artistInfoContent" style="font-size:0.65rem;color:var(--dim);line-height:1.55;padding:4px;overflow-y:auto;height:calc(100% - 22px)"></div>
    </div>
  </div>
  <div class="hero-overlay" id="heroOverlay">
    <div class="hero-img placeholder" id="heroImg">&#127925;</div>
  </div>
</div>

<script src="config.js"></script>
<script>
(function(){
"use strict";
var API_PROXY="https://rr-records-proxy.dan-m-kelly.workers.dev";
(function(){if(typeof LLM_KEY==="undefined")window.LLM_KEY="";if(typeof LFM_KEY==="undefined")window.LFM_KEY="";if(typeof DGS_KEY==="undefined")window.DGS_KEY="";if(API_PROXY){window.LLM_KEY="proxy";window.LLM_URL="proxy";window.LLM_MODEL="deepseek-chat";window.LFM_KEY="proxy";window.DGS_KEY="proxy"}})();

var conv=[],artistName="";
var expectingName=false,spokeLast=false;
var bobMemory={visits:0,lastVisit:"",recentArtists:[],recentGenres:[],totalSearches:0,userName:""};
var chatMsgs=document.getElementById("chatMsgs"),input=document.getElementById("betaInput");
var nodePositions=[]; // for canvas lines

// Canvas
var canvas=document.getElementById("web"),ctx=canvas.getContext("2d"),w,h;
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight}
resize();window.addEventListener("resize",resize);
var stars=[];for(var i=0;i<120;i++)stars.push({x:Math.random(),y:Math.random(),z:Math.random()*0.5+0.2,r:Math.random()*1+0.4,sp:Math.random()*0.0003+0.0001});

var GENRE_PALETTE=["#E85D3F","#C4A44A","#4A9E8E","#7B68EE","#DC143C","#FF8C00","#00CED1"];

function draw(){
  ctx.clearRect(0,0,w,h);
  var cx=w/2,cy=h/2;
  // Web lines
  nodePositions.forEach(function(n,i){
    if(i===0)return;
    var px=n.x,py=n.y;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(px,py);
    ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=0.5;ctx.stroke();
  });

  // Outer ring at disc-area center
  var da=document.getElementById("discArea"),dar=da.getBoundingClientRect();
  var dcx=dar.left+dar.width/2,dcy=dar.top+dar.height/2;
  ctx.beginPath();ctx.arc(dcx,dcy,130,0,Math.PI*2);
  ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1.5;ctx.stroke();
  var qlabels=["ALBUMS","ARTISTS","GENRES","ARTIST INFO"],qangles=[-Math.PI*0.7,-Math.PI*0.2,Math.PI*0.3,Math.PI*0.8];
  qlabels.forEach(function(l,i){
    var a=qangles[i],lx=dcx+Math.cos(a)*137,ly=dcy+Math.sin(a)*137;
    ctx.fillStyle="rgba(255,255,255,0.12)";ctx.font="6.5px Inter,system-ui";ctx.textAlign="center";
    ctx.fillText(l,lx,ly+2);
  });
  stars.forEach(function(s){
    var px=(s.x)*w,py=(s.y)*h;
    ctx.beginPath();ctx.arc(px,py,s.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,"+(s.z*0.4)+")";ctx.fill();
    s.y+=s.sp;if(s.y>1)s.y=0;if(s.y<0)s.y=1;
  });
  requestAnimationFrame(draw);
}
draw();

function updateNodePositions(){
  nodePositions=[];
  var hc=document.getElementById("heroOverlay"),hr=hc.getBoundingClientRect();
  var hcx=hr.left+hr.width/2,hcy=hr.top+hr.height/2;
  nodePositions.push({x:hcx,y:hcy});
  var da=document.getElementById("discArea"),dr=da.getBoundingClientRect();
  document.querySelectorAll(".album-tile,.artist-card").forEach(function(el){
    var r=el.getBoundingClientRect();
    if(r.left>=dr.left&&r.top>=dr.top){
      nodePositions.push({x:r.left+r.width/2,y:r.top+r.height/2});
    }
  });
  // Move center of canvas to hero position
  w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;
  requestAnimationFrame(updateNodePositions);
}
updateNodePositions();

// Chat
function sc(){chatMsgs.scrollTop=chatMsgs.scrollHeight}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function addMsg(t,s){
  var d=document.createElement("div");d.className="msg "+s;var now=new Date(),time=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  if(s==="bot")t=chatEnrich(t);else t=esc(t);
  d.innerHTML='<div class="msg-bubble">'+t+'</div><div class="msg-meta">'+(s==="bot"?"Bob":"You")+' · '+time+(s==="bot"?' <button class="msg-speak" onclick="betaSpeak(this)" title="Listen">&#128266;</button>':'')+'</div>';
  chatMsgs.appendChild(d);sc();
}

var knownNames=[];
function chatEnrich(html){
  if(!knownNames.length)return html;
  knownNames.slice().sort(function(a,b){return b.length-a.length}).forEach(function(n){
    var rx=new RegExp('(^|\\s|>)('+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?=[\\s,.\!?;:<]|$)','gi');
    html=html.replace(rx,function(m,p1,p2){return p1+'<span style="color:var(--accent2);cursor:pointer;text-decoration:underline;font-weight:600" onclick="betaChat(\''+p2.replace(/'/g,"\\'")+'\')">'+p2+'</span>'});
  });
  return html;
}
function addKnown(n){if(n&&n.length>1&&knownNames.indexOf(n)===-1)knownNames.push(n)}

// TTS
window.betaSpeak=function(btn){
  var s=window.speechSynthesis;
  if(s.speaking){s.cancel();document.querySelectorAll(".msg-speak.on").forEach(function(b){b.classList.remove("on")});return}
  var txt=(btn.closest(".msg-bubble").textContent||"").trim();
  document.querySelectorAll(".msg-speak.on").forEach(function(b){b.classList.remove("on")});btn.classList.add("on");
  function speak(t){
    var u=new SpeechSynthesisUtterance(t);u.lang="en-IE";u.rate=1;u.pitch=1;
    var voices=s.getVoices();
    if(voices.length){
      var en=voices.filter(function(v){return v.lang.indexOf("en")===0});
      var fem=["female","moira","fiona","zira","samantha","karen"];
      en=en.filter(function(v){var n=v.name.toLowerCase();return !fem.some(function(f){return n.indexOf(f)>-1})});
      if(!en.length)en=voices.filter(function(v){return v.lang.indexOf("en")===0});
      var best=null;en.forEach(function(v){var sc=3;if(v.lang==="en-IE")sc=10;else if(v.lang==="en-GB")sc=7;if(!best||sc>best._score){v._score=sc;best=v}});
      u.voice=best||voices[0];
    }
    u.onend=function(){btn.classList.remove("on")};u.onerror=function(){btn.classList.remove("on")};s.speak(u);
  }
  if(s.getVoices().length===0){s.onvoiceschanged=function(){s.onvoiceschanged=null;speak(txt)}}else speak(txt);
};

// STT
var micBtn=document.getElementById("betaMic"),recognition=null;
if("webkitSpeechRecognition" in window||"SpeechRecognition" in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang="en-IE";
  recognition.onresult=function(e){var t="";for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;input.value=t;if(e.results[0].isFinal){micBtn.classList.remove("on");spokeLast=true;send()}};
  recognition.onerror=function(){micBtn.classList.remove("on")};recognition.onend=function(){micBtn.classList.remove("on")};
}
if(!recognition)micBtn.style.display="none";
micBtn.onclick=function(){if(!recognition)return;if(micBtn.classList.contains("on")){recognition.stop();micBtn.classList.remove("on")}else{try{recognition.start();micBtn.classList.add("on")}catch(e){}}};

// Memory
function loadMemory(){
  try{var r=localStorage.getItem("bob_beta_memory");if(r){var p=JSON.parse(r);bobMemory=p}}catch(e){}
  bobMemory.visits=(bobMemory.visits||0)+1;bobMemory.lastVisit=new Date().toISOString();
  bobMemory.recentArtists=bobMemory.recentArtists||[];bobMemory.recentGenres=bobMemory.recentGenres||[];
  bobMemory.totalSearches=bobMemory.totalSearches||0;bobMemory.userName=bobMemory.userName||"";
  expectingName=!bobMemory.userName;saveMemory();
}
function saveMemory(){try{localStorage.setItem("bob_beta_memory",JSON.stringify(bobMemory))}catch(e){}}
function rememberArtist(a){if(!a)return;var ix=bobMemory.recentArtists.indexOf(a);if(ix>-1)bobMemory.recentArtists.splice(ix,1);bobMemory.recentArtists.unshift(a);if(bobMemory.recentArtists.length>10)bobMemory.recentArtists.pop();bobMemory.totalSearches++;saveMemory()}
function getPreamble(){var p=[];if(bobMemory.userName)p.push("User: "+bobMemory.userName);if(bobMemory.visits>1)p.push("Visit #"+bobMemory.visits);if(bobMemory.recentArtists.length)p.push("Past: "+bobMemory.recentArtists.slice(0,5).join(", "));return p.length?"[Returning customer] "+p.join(" ")+" ":""}

// API
function lfm(p){var u=API_PROXY?API_PROXY+"/api/lastfm?"+p:"https://ws.audioscrobbler.com/2.0/?api_key="+LFM_KEY+"&format=json&"+p;return fetch(u).then(function(r){return r.ok?r.json():null}).catch(function(){return null})}
async function getSim(a){if(!LFM_KEY)return[];var d=await lfm("method=artist.getsimilar&artist="+encodeURIComponent(a)+"&limit=12");return(d&&d.similarartists&&d.similarartists.artist)?d.similarartists.artist.map(function(x){var m=parseFloat(x.match);return{name:x.name,match:m<=1?Math.round(m*100):Math.round(m)}}):[]}
async function getAlb(a){if(!LFM_KEY)return[];var d=await lfm("method=artist.gettopalbums&artist="+encodeURIComponent(a)+"&limit=12");if(!d||!d.topalbums||!d.topalbums.album)return[];return d.topalbums.album.map(function(x){var img="";if(x.image){for(var i=x.image.length-1;i>=0;i--){if(x.image[i]["#text"]){img=x.image[i]["#text"];break}}}return{name:x.name,artist:x.artist?x.artist.name:a,playcount:parseInt(x.playcount)||0,img:img}})}
async function getTgs(a){if(!LFM_KEY)return[];var d=await lfm("method=artist.gettoptags&artist="+encodeURIComponent(a)+"&limit=10");return(d&&d.toptags&&d.toptags.tag)?d.toptags.tag.map(function(x){return{name:x.name,count:parseInt(x.count)}}):[]}
async function getBio(a){if(!LFM_KEY)return null;var d=await lfm("method=artist.getinfo&artist="+encodeURIComponent(a));if(!d||!d.artist)return null;var bio=(d.artist.bio&&d.artist.bio.summary)?d.artist.bio.summary.replace(/<[^>]+>/g,"").replace(/<a[^>]*>.*?read more.*?<\/a>/gi,"").replace(/read more on last\.fm\.?/i,"").trim().slice(0,500):"";return{name:d.artist.name,bio:bio,listeners:d.artist.stats?d.artist.stats.listeners:"",playcount:d.artist.stats?d.artist.stats.playcount:""}}
async function getArtistImg(a){if(!LFM_KEY)return null;var d=await lfm("method=artist.getinfo&artist="+encodeURIComponent(a));if(!d||!d.artist||!d.artist.image)return null;for(var i=d.artist.image.length-1;i>=0;i--){if(d.artist.image[i]["#text"])return d.artist.image[i]["#text"]}return null}

// LLM
var BOB_VOICE_BASE="You are Bob, an AI chatbot music guide at Round & Round Records, Dublin (est. 2005). Dublin flavour: 'grand','deadly','class','sound','craic'. 1-3 sentences. Never list data. No em dashes, no markdown. You ARE a bot — never pretend to be human.";
async function chatLLM(msg){
  if(!LLM_KEY)return null;
  var msgs=[{role:"system",content:getPreamble()+BOB_VOICE_BASE}];
  for(var i=0;i<conv.length;i++)msgs.push(conv[i]);msgs.push({role:"user",content:msg});
  try{
    var u=API_PROXY?API_PROXY+"/api/llm":(LLM_URL||"https://api.deepseek.com/v1/chat/completions");
    var o={method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:LLM_MODEL||"deepseek-chat",messages:msgs,temperature:0.9,max_tokens:300})};
    if(!API_PROXY)o.headers.Authorization="Bearer "+LLM_KEY;
    var r=await fetch(u,o);if(!r.ok)return null;
    var d=await r.json();var reply=d.choices[0].message.content.trim();
    conv.push({role:"user",content:msg});conv.push({role:"assistant",content:reply});if(conv.length>16)conv=conv.slice(-16);
    return reply;
  }catch(e){return null}
}

// Gibberish
function isGibberish(txt){
  if(txt.length<2)return true;
  var c=txt.replace(/[^a-zA-Z]/g,'').toLowerCase();
  if(/^[^a-zA-Z0-9\s]{3,}$/.test(txt))return true;if(/(.)\1{4,}/.test(txt))return true;
  if(c.length<2&&txt.length>2)return true;if(/^(asdf|qwer|zxcv|uiop|hjkl)/i.test(c))return true;
  if(/^(yes|no|ok|okay|yeah|yep|nope|maybe|sure|idk|dunno|hello|hi|hey|thanks|thx|ty|bye|cya|lol|haha|hehe|what|why|when|who|how|help|test|testing)$/i.test(txt))return true;
  if(txt.split(/\s+/).length===1&&txt.length<5&&!/^[A-Z]/.test(txt))return true;
  if(c.length>=4&&!/^[A-Z]{2,6}$/.test(txt.trim())){var v=c.match(/[aeiou]/g);var vc=v?v.length:0;if(vc===0||(c.length-vc)/vc>3)return true}return false;
}

function extractArtists(txt){
  var t=txt.toLowerCase().replace(/[.,!?;:'"()]/g," ").trim();
  t=t.replace(/^(i am |we are |i |we )(really |kinda |sort of |pretty |absolutely |so |super )?(into |a fan of |loving |enjoying |listening to |liking |digging )/i,"");
  t=t.replace(/^(what('s| is) (similar to|like) |suggest |recommend |find me |show me |search for |tell me about |give me |i like |i love |i enjoy )/i,"");
  var parts=t.split(/\s+(?:and|or)\s+|,\s*/);var results=[];
  parts.forEach(function(p){var w=p.trim().split(/\s+/).filter(function(x){return x.length>1&&!/^(the|and|or|but|for|nor|yet|so|in|on|at|to|by|from|with|about|into|upon|over|under|also|get|got|has|had|been|was|were|are|its|not|very|much|well|even|still|always|never|long|time|favorite|favourite|thing|things|stuff|way|lot|lots|bit|kind|sort)$/i.test(x)});if(w.length>=1)results.push(w.slice(0,3).join(" "))});
  return results.filter(function(r){return r&&r.length>=2});
}

// Render discovery
function renderDiscovery(sim,tgs,albs,bio,artImg,chatTexts){
  // Albums tile grid with dynamic sizing
  var ac=document.getElementById("albumsContent");
  ac.innerHTML=albs.slice(0,16).map(function(a,i){
    var img=a.img||"",dq=encodeURIComponent((a.artist||artistName)+" "+a.name);
    var badges='<div class="at-badges"><span class="at-badge at-badge-order" onclick="event.stopPropagation();betaChat(\'order '+a.name.replace(/'/g,"\\'")+' '+ (a.artist||artistName).replace(/'/g,"\\'")+'\')">Order</span><a class="at-badge at-badge-discogs" href="https://www.discogs.com/search/?q='+dq+'&type=release" target="_blank" onclick="event.stopPropagation()">Discogs</a></div>';
    return'<div class="album-tile" onclick="betaChat(\''+a.name.replace(/'/g,"\\'")+'\')">'+(img?'<img class="at-img" src="'+img+'" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"><div class="at-placeholder" style="display:none;background:'+GENRE_PALETTE[i%7]+'">'+a.name.charAt(0)+'</div>':'<div class="at-placeholder" style="background:'+GENRE_PALETTE[i%7]+'">'+a.name.charAt(0)+'</div>')+'<div class="at-label">'+esc(a.name)+'</div>'+badges+'</div>';
  }).join("");

  // Artists card grid
  var arc=document.getElementById("artistsContent");
  arc.innerHTML=sim.slice(0,12).map(function(s,i){
    return'<div class="artist-card" onclick="betaChat(\''+s.name.replace(/'/g,"\\'")+'\')"><div class="ac-av" style="background:'+GENRE_PALETTE[i%7]+'">'+(s.name.charAt(0)+(s.name.indexOf(" ")>-1?s.name.charAt(s.name.indexOf(" ")+1):"")).toUpperCase()+'</div><div class="ac-info"><div class="ac-name">'+esc(s.name)+'</div><div class="ac-match">'+Math.round(s.match)+'% match</div></div></div>';
  }).join("");

  // Genre chips
  var gc=document.getElementById("genresContent");
  gc.innerHTML=tgs.slice(0,14).map(function(t,i){
    return'<span class="genre-chip" style="font-size:'+(0.55+Math.random()*0.12).toFixed(2)+'rem" onclick="betaChat(\''+t.name.replace(/'/g,"\\'")+'\')">'+esc(t.name)+'</span>';
  }).join("");

  // Artist info quadrant
  var ai=document.getElementById("artistInfoContent");
  var name=artistName.charAt(0).toUpperCase()+artistName.slice(1);
  if(bio){
    var parts=[];
    parts.push('<h3 style="font-size:0.85rem;font-weight:800;color:var(--text);margin-bottom:8px">'+esc(name)+'</h3>');
    if(bio.bio)parts.push('<p style="margin-bottom:10px;line-height:1.5">'+esc(bio.bio.slice(0,500))+'</p>');
    if(bio.listeners)parts.push('<p style="font-size:0.58rem"><strong style="color:var(--text)">'+parseInt(bio.listeners).toLocaleString()+'</strong> listeners &middot; <strong style="color:var(--text)">'+parseInt(bio.playcount).toLocaleString()+'</strong> plays</p>');
    if(chatTexts&&chatTexts.length)parts.push('<p style="margin-top:8px;padding:6px 8px;background:rgba(255,255,255,0.02);border-radius:6px;font-size:0.62rem;font-style:italic">"'+esc(chatTexts[0].slice(0,300))+(chatTexts[0].length>300?'…"':'"')+'</p>');
    ai.innerHTML=parts.join("");
  }else{
    ai.innerHTML='<p style="font-style:italic">Search an artist to see their info here</p>';
  }

  // Hero image
  var hi=document.getElementById("heroImg");
  if(artImg){hi.className="hero-img";hi.src=artImg;hi.onerror=function(){hi.className="hero-img placeholder";hi.innerHTML='&#127925;'}}
  else{hi.className="hero-img placeholder";hi.innerHTML='&#127925;'}

  if(albs.length)albs.forEach(function(a){addKnown(a.name);if(a.artist)addKnown(a.artist)});
  if(sim.length)sim.forEach(function(s){addKnown(s.name)});
  setTimeout(updateNodePositions,300);
}


// Send
window.betaChat=function(t){input.value=t;send()};
async function send(){
  var txt=input.value.trim();if(!txt)return;input.value="";

  if(txt==="CLS"){localStorage.removeItem("bob_beta_memory");bobMemory={visits:0,lastVisit:"",recentArtists:[],recentGenres:[],totalSearches:0,userName:""};expectingName=true;addMsg("All clear! Fresh start.","bot");return}

  addMsg(txt,"user");

  if(expectingName&&!bobMemory.userName){
    var name=txt.replace(/^(i'm|i am|my name is|call me|it's|name's)\s+/i,"").replace(/[.!?,]$/,"").trim();
    if(name&&name.split(/\s+/).length<=3&&name.length>=2){
      bobMemory.userName=name;expectingName=false;saveMemory();document.getElementById("bobLabel").textContent="Music guide · knows "+name;
      addMsg("Class, nice to meet you <strong>"+esc(name)+"</strong>! What are you into?","bot");
      if(spokeLast){spokeLast=false;setTimeout(function(){var b=chatMsgs.querySelector(".msg.bot:last-child .msg-speak");if(b)betaSpeak(b)},200)}
      return;
    }
  }

  if(isGibberish(txt)){addMsg("Didn't quite catch that! Give me an artist or genre.","bot");return}
  if(txt.toLowerCase()==="human"){addMsg("Round &amp; Round Records, 32 Main Street, Dublin. Phone: +353 1 671 1711. Email: hello@roundandroundrecords.ie. Mon-Sat 10-6, Sun 12-5.","bot");addMsg("Anything else I can help with?","bot");return}

  var llmReply=null;
  if(LLM_KEY&&LLM_MODEL)llmReply=await chatLLM(txt);
  if(llmReply)addMsg(llmReply,"bot");

  var artists=extractArtists(txt);
  if(artists.length){
    var an=artists[0];artistName=an;rememberArtist(an);
    var sim=await getSim(an),albs=await getAlb(an),tgs=await getTgs(an),bio=await getBio(an),artImg=await getArtistImg(an);
    renderDiscovery(sim,tgs,albs,bio,artImg,llmReply?[llmReply]:[]);
  }

  if(!artists.length&&!llmReply)addMsg("Try an artist name or genre — I'll find you something!","bot");

  if(spokeLast){spokeLast=false;setTimeout(function(){var b=chatMsgs.querySelector(".msg.bot:last-child .msg-speak");if(b)betaSpeak(b)},200)}
}

// Init
document.getElementById("betaSend").addEventListener("click",send);
input.addEventListener("keydown",function(e){if(e.key==="Enter")send()});loadMemory();
if(bobMemory.userName)document.getElementById("bobLabel").textContent="Music guide · knows "+bobMemory.userName;

(function(){
  if(bobMemory.visits>1&&bobMemory.userName){addMsg("Welcome back, <strong>"+esc(bobMemory.userName)+"</strong>! I'm Bob, an AI chatbot — your music guide.","bot");setTimeout(function(){addMsg("What are you in the mood for today?","bot")},1200)}
  else{addMsg("Hey! I'm <strong>Bob</strong>, an AI chatbot — not a real person. I'm your music guide at Round &amp; Round Records.","bot");setTimeout(function(){addMsg("I remember a few things on your device to make visits better. Never on a server.","bot")},1500);setTimeout(function(){addMsg("Tell me an artist you love, or ask about a genre!","bot")},2500);setTimeout(function(){if(!bobMemory.userName){addMsg("What's your name? (Just on your device, nowhere else)","bot");expectingName=true}},3500)}
})();
})();
</script>
