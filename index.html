<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round & Round Records - Chat with Bob</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wood: #8B6914;
  --wood-dark: #5C440C;
  --cream: #FFF8E7;
  --ink: #1A1A1A;
  --ink-light: #333;
  --accent: #D44C2F;
  --accent-hover: #B33D24;
  --bubble-bot: #F0E8D8;
  --bubble-user: #1A1A1A;
  --subtle: #C4B896;
  --card-bg: #FFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 8px;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #F5F0E8;
  color: var(--ink);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--ink);
  color: var(--cream);
  padding: 0;
  border-bottom: 3px solid var(--accent);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.6rem;
  font-weight: bold;
  letter-spacing: 1px;
  color: var(--cream);
}
.logo-accent { color: var(--accent); }
.tagline { font-size: 0.8rem; color: var(--subtle); margin-left: 8px; }
.header-spacer { flex: 1; }
.badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Layout */
.main-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
  min-height: calc(100vh - 140px);
}

/* Chat Panel */
.chat-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid #E5DDD0;
}
.chat-header {
  background: var(--ink);
  color: var(--cream);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 1.2rem;
}
.chat-header-info h3 { font-size: 0.95rem; font-weight: 600; }
.chat-header-info p { font-size: 0.7rem; color: var(--subtle); margin-top: 2px; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: #FCFAF5;
  min-height: 480px;
  max-height: calc(100vh - 320px);
}
.msg {
  max-width: 82%;
  line-height: 1.5;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.9rem;
}
.msg.bot .msg-bubble { background: var(--bubble-bot); color: var(--ink); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
.msg-meta { font-size: 0.65rem; color: #999; margin-top: 4px; padding: 0 4px; }
.msg.user .msg-meta { text-align: right; }

.typing-indicator {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--subtle);
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.chat-suggestions {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 0;
}
.chat-suggestion {
  background: #fff; border: 1px solid #DDD4C4; color: var(--ink-light);
  padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
  transition: all 0.15s;
}
.chat-suggestion:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid #E5DDD0;
  display: flex; gap: 10px;
  background: #fff;
}
.chat-input {
  flex: 1;
  border: 2px solid #E5DDD0;
  border-radius: 24px;
  padding: 10px 18px;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.chat-send:hover { background: var(--accent-hover); }

/* Picks Panel */
.picks-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #E5DDD0;
  display: flex;
  flex-direction: column;
}
.picks-header {
  background: var(--wood);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}
.picks-count {
  background: rgba(255,255,255,0.25);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.7rem;
  margin-left: auto;
}
.picks-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-content: start;
  max-height: calc(100vh - 320px);
}
.picks-empty {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--subtle);
  padding: 40px 20px;
  font-size: 0.85rem;
  line-height: 1.6;
}
.picks-empty-icon { font-size: 2rem; margin-bottom: 8px; }

.product-card {
  background: #FCFAF5;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid #EEE8DA;
  display: flex;
  flex-direction: column;
}
.product-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.product-card-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: #E8E0D0;
  display: block;
}
.product-card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; }
.product-card-artist {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 2px;
  line-height: 1.2;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-title {
  font-size: 0.78rem;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
}
.product-card-price {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--ink);
}
.product-card-format {
  font-size: 0.6rem;
  background: var(--ink);
  color: #fff;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Footer */
.footer {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px;
  text-align: center;
  color: var(--subtle);
  font-size: 0.75rem;
  border-top: 1px solid #E5DDD0;
}
.footer a { color: var(--wood); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Mobile */
@media (max-width: 860px) {
  .main-wrap {
    grid-template-columns: 1fr;
  }
  .picks-panel {
    order: 3;
    max-height: none;
  }
  .picks-grid {
    grid-template-columns: 1fr 1fr 1fr;
    max-height: 360px;
  }
  .chat-messages { min-height: 360px; max-height: 400px; }
}
@media (max-width: 500px) {
  .picks-grid { grid-template-columns: 1fr 1fr; }
  .header-inner { padding: 10px 14px; }
  .main-wrap { padding: 12px; }
  .logo { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <span class="logo">ROUND <span class="logo-accent">&amp;</span> ROUND RECORDS</span>
    <span class="tagline">Your personal music guides since 2005</span>
    <span class="header-spacer"></span>
    <span class="badge">Now Chatting</span>
  </div>
</header>

<div class="main-wrap">

  <!-- Chat Panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-avatar">B</div>
      <div class="chat-header-info">
        <h3>Bob</h3>
        <p>Music guide &amp; crate-digger</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Ask Bob anything about music..." autofocus>
      <button class="chat-send" id="chatSend" aria-label="Send">&#10148;</button>
    </div>
  </div>

  <!-- Picks Panel -->
  <div class="picks-panel" id="picksPanel">
    <div class="picks-header">
      &#9835; Bob's Picks <span class="picks-count" id="picksCount">0</span>
    </div>
    <div class="picks-grid" id="picksGrid">
      <div class="picks-empty">
        <div class="picks-empty-icon">&#128218;</div>
        <p>Tell Bob what you're after and his suggestions will appear right here.</p>
      </div>
    </div>
  </div>

</div>

<footer class="footer">
  Powered by <a href="https://spindizzyrecords.com" target="_blank">Spindizzy Records</a> catalogue &bull; 32 Market Arcade, Dublin
</footer>

<script>
// ============================================================
// LLM CONFIGURATION
// Set your API key and endpoint below. Leave blank to use
// the built-in rule-based engine as a fallback.
//
// Groq (free tier, fast, OpenAI-compatible):
//   LLM_KEY = "gsk_your-key-here"
//   LLM_URL = "https://api.groq.com/openai/v1/chat/completions"
//   LLM_MODEL = "llama-3.1-8b-instant"
//
// OpenAI:
//   LLM_KEY = "sk-your-key-here"
//   LLM_URL = "https://api.openai.com/v1/chat/completions"
//   LLM_MODEL = "gpt-4o-mini"
//
// Together.ai (free trial credits):
//   LLM_KEY = "your-key-here"
//   LLM_URL = "https://api.together.xyz/v1/chat/completions"
//   LLM_MODEL = "meta-llama/Llama-3.1-8B-Instruct"
// ============================================================
const LLM_KEY = "";
const LLM_URL = "";
const LLM_MODEL = "";

// === Conversation history (for LLM context) ===
let conversationHistory = [];

// === Build a compact catalogue summary for the LLM system prompt ===
function buildCatalogueSummary() {
  var genres = {};
  catalogue.forEach(function(p) {
    p.genres.forEach(function(g) {
      if (!genres[g]) genres[g] = [];
      if (genres[g].length < 3) genres[g].push(p.artist + " - " + p.title);
    });
  });
  var lines = ["You have access to the Spindizzy Records catalogue. Here is a summary:"];
  lines.push("Total products: " + catalogue.length);
  lines.push("Available genres: " + Object.keys(genres).sort().join(", "));
  lines.push("Notable artists: Radiohead, Joy Division, Dinosaur Jr., Herbie Hancock, Chet Baker, Art Blakey, Pixies, The Breeders, 2Pac, Damien Dempsey, Glen Hansard, Morrissey, Camel, Simple Minds, BABYMETAL, Bananarama, beabadoobee, Blondshell, AFI, and more.");
  lines.push("Formats: Vinyl, CD, Vinyl Boxset. Prices range from EUR 2 to EUR 156.");
  lines.push("Special knowledge: Kim Deal formed The Breeders after Pixies. Also had side project The Amps.");
  return lines.join("\n");
}

// === Call the LLM ===
async function callLLM(userMessage) {
  if (!LLM_KEY || !LLM_URL || !LLM_MODEL) return null;
  var systemPrompt = "You are Bob, a super friendly, super knowledgeable music guide at Round & Round Records, a small independent record shop in Dublin, Ireland (established 2005). Your vibe: warm, passionate, a bit of a crate-digger. You speak like the best record shop staff member ever: know your stuff, never pretentious, always excited to help someone find their next favourite album.\n\n";
  systemPrompt += "Rules:\n- Keep responses warm and conversational (2-4 sentences usually)\n- Use details: catalogue numbers, pressing info, era context when you can\n- NEVER make up a product that is not mentioned below\n- If a customer asks about something not in the summary below, be honest: offer to help them search or suggest something adjacent\n- If you don't know, say so and pivot to something you can help with\n- Mention that the customer should check 'Bob's Picks' panel for what's actually in stock\n- No em dashes. Use commas, colons, or full stops instead.\n\n";
  systemPrompt += "You work with the Spindizzy Records catalogue in Dublin. Here is a summary of what's available right now:\n" + buildCatalogueSummary();

  var messages = [{ role: "system", content: systemPrompt }];
  for (var i = 0; i < conversationHistory.length; i++) {
    messages.push(conversationHistory[i]);
  }
  messages.push({ role: "user", content: userMessage });

  try {
    var resp = await fetch(LLM_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + LLM_KEY },
      body: JSON.stringify({ model: LLM_MODEL, messages: messages, temperature: 0.8, max_tokens: 300 })
    });
    if (!resp.ok) throw new Error("API error: " + resp.status);
    var data = await resp.json();
    var reply = data.choices[0].message.content.trim();
    conversationHistory.push({ role: "user", content: userMessage });
    conversationHistory.push({ role: "assistant", content: reply });
    if (conversationHistory.length > 12) conversationHistory = conversationHistory.slice(-12);
    return reply;
  } catch (e) {
    console.warn("LLM call failed, falling back to rule-based:", e.message);
    return null;
  }
}

// === Helpers ===
function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = '<div class="msg-bubble">' + text + '</div><div class="msg-meta">' + (sender === 'bot' ? 'Bob' : 'You') + ' &middot; ' + time + '</div>';
  chatMessages.appendChild(div);
  scrollChat();
}

function addSuggestions(suggestions) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="chat-suggestions">' + suggestions.map(s => '<span class="chat-suggestion" onclick="quickAsk(\'' + s.replace(/'/g, "\\'") + '\')">' + s + '</span>').join('') + '</div>';
  chatMessages.appendChild(div);
  scrollChat();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  div.id = 'typingMsg';
  chatMessages.appendChild(div);
  scrollChat();
}

function hideTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function quickAsk(text) {
  chatInput.value = text;
  sendMessage();
}

// === Pick management ===
function getImageUrl(product, size) {
  if (!product.img) return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><rect fill="#E8E0D0" width="200" height="200"/><text x="100" y="110" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#999">No Image</text></svg>');
  var url = product.img;
  if (url.includes('cdn.shopify.com') && !url.includes('width=')) {
    url = url.replace(/(\.[a-zA-Z]+)(\?|$)/, '_200x200$2');
  }
  if (url.includes('cdn.shopify.com') && url.includes('width=')) {
    url = url.replace(/width=\d+/, 'width=200');
  }
  return url;
}

function addPick(product) {
  if (picks.find(p => p.artist === product.artist && p.title === product.title)) return;
  picks.push(product);
  renderPicks();
}

function addPicks(products) {
  products.forEach(function(p) { addPick(p); });
  renderPicks();
}

function renderPicks() {
  picksGrid.innerHTML = '';
  picksCount.textContent = picks.length;
  if (picks.length === 0) {
    picksGrid.innerHTML = '<div class="picks-empty"><div class="picks-empty-icon">&#128218;</div><p>Tell Bob what you\'re after and his suggestions will appear right here.</p></div>';
    return;
  }
  picks.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'product-card';
    card.onclick = function() { window.open(p.url, '_blank'); };
    card.innerHTML =
      '<img class="product-card-img" src="' + getImageUrl(p) + '" alt="' + p.title + '" loading="lazy" onerror="this.src=\'data:image/svg+xml,' + encodeURIComponent('<svg xmlns=\\"http://www.w3.org/2000/svg\\" width=\\"200\\" height=\\"200\\" viewBox=\\"0 0 200 200\\"><rect fill=\\"#E8E0D0\\" width=\\"200\\" height=\\"200\\"/><text x=\\"100\\" y=\\"110\\" text-anchor=\\"middle\\" font-family=\\"sans-serif\\" font-size=\\"14\\" fill=\\"#999\\">No Image</text></svg>') + '\'">' +
      '<div class="product-card-body">' +
        '<div class="product-card-artist">' + p.artist + '</div>' +
        '<div class="product-card-title">' + p.title + '</div>' +
        '<div class="product-card-footer">' +
          '<span class="product-card-price">&euro;' + p.price + '</span>' +
          '<span class="product-card-format">' + p.format + '</span>' +
        '</div>' +
      '</div>';
    picksGrid.appendChild(card);
  });
}

// === Search ===
function searchCatalogue(query) {
  var q = query.toLowerCase().trim();
  var results = [];
  catalogue.forEach(function(p) {
    var score = 0;
    if (p.artist.toLowerCase().indexOf(q) > -1) score += 10;
    if (p.title.toLowerCase().indexOf(q) > -1) score += 5;
    p.genres.forEach(function(g) { if (g.toLowerCase().indexOf(q) > -1 || q.indexOf(g.toLowerCase()) > -1) score += 3; });
    if (p.era === q || (q === '80s' && p.era === '80s') || (q === '90s' && p.era === '90s') || (q === '70s' && p.era === '70s') || (q === '60s' && p.era === '60s') || (q === '00s' && p.era === '00s') || (q === '10s' && p.era === '10s') || (q === '20s' && p.era === '20s')) score += 4;
    if (p.format.toLowerCase().indexOf(q) > -1) score += 4;
    if (score > 0) results.push({ product: p, score: score });
  });
  results.sort(function(a, b) { return b.score - a.score; });
  return results.slice(0, 8).map(function(r) { return r.product; });
}

function searchByName(names) {
  var all = [];
  names.forEach(function(name) {
    var q = name.toLowerCase();
    catalogue.forEach(function(p) {
      if (p.artist.toLowerCase().indexOf(q) > -1 && all.indexOf(p) === -1) all.push(p);
    });
  });
  return all.slice(0, 8);
}

// === Conversation engine ===
function getSearchResults(userInput) {
  var text = userInput.trim();
  var textLower = text.toLowerCase();

  // Check special knowledge maps for search expansions
  for (var key in knowledge) {
    if (knowledge.hasOwnProperty(key) && textLower.indexOf(key) > -1) {
      var searches = knowledge[key].searches;
      if (searches && searches.length > 0) {
        var found = searchByName(searches);
        return { knowledgeHit: knowledge[key], results: found };
      }
    }
  }

  // Check special knowledge response-only (no search expansion)
  for (var k in knowledge) {
    if (knowledge.hasOwnProperty(k) && textLower.indexOf(k) > -1) {
      return { knowledgeHit: knowledge[k], results: [] };
    }
  }

  // General catalogue search
  return { knowledgeHit: null, results: searchCatalogue(text) };
}

function formatResultMessage(results) {
  if (results.length === 0) return null;
  var artistMap = {};
  results.forEach(function(r) { artistMap[r.artist] = true; });
  var artistCount = Object.keys(artistMap).length;
  return results.length === 1
    ? "Found 1 match in the Spindizzy catalogue:"
    : "Found " + results.length + " matches across " + artistCount + " artist" + (artistCount > 1 ? "s" : "") + ":";
}

function showResults(searchResult) {
  if (searchResult.results && searchResult.results.length > 0) {
    addPicks(searchResult.results);
    var msg = formatResultMessage(searchResult.results);
    if (msg) addMessage(msg + " Check Bob's Picks on the right.", 'bot');
    if (searchResult.results.length > 4) {
      addSuggestions(["New releases", "Rock classics", "Jazz essentials", "Electronic & dance", "Irish artists"]);
    }
  }
}

// === Main send ===
async function sendMessage() {
  var text = chatInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  chatInput.value = '';
  showTyping();

  // Run catalogue search immediately (fast, no dependency on LLM)
  var searchResult = getSearchResults(text);

  var llmReply = null;
  if (LLM_KEY && LLM_URL && LLM_MODEL) {
    llmReply = await callLLM(text);
  }

  hideTyping();

  if (llmReply) {
    // LLM response for conversational tone
    addMessage(llmReply, 'bot');
    // Show search results in picks panel
    showResults(searchResult);
    // If no results from search, offer suggestions
    if (!searchResult.results || searchResult.results.length === 0) {
      addSuggestions(["Jazz", "Rock", "Electronic", "Hip-Hop", "Metal", "Indie", "Irish artists", "90s classics"]);
    }
  } else {
    // Fallback to rule-based engine
    if (searchResult.knowledgeHit && searchResult.knowledgeHit.response) {
      addMessage(searchResult.knowledgeHit.response, 'bot');
      showResults(searchResult);
    } else if (searchResult.results.length > 0) {
      showResults(searchResult);
      var artistMap = {};
      searchResult.results.forEach(function(r) { artistMap[r.artist] = true; });
      var artistCount = Object.keys(artistMap).length;
      var msg = searchResult.results.length === 1
        ? "Got one for you!"
        : "Nice one! Found " + searchResult.results.length + " matches across " + artistCount + " artist" + (artistCount > 1 ? "s" : "") + ".";
      addMessage(msg + " Take a look at Bob's Picks on the right. Anything catch your eye?", 'bot');
      addSuggestions(["New releases", "Rock classics", "Jazz essentials", "Electronic & dance", "Irish artists"]);
    } else {
      addMessage("Hmm, nothing jumping out at me for \"" + text + "\" in the Spindizzy catalogue right now. Could you try a different artist, genre, or style? I'm here to dig!", 'bot');
      addSuggestions(["Jazz", "Rock", "Electronic", "Hip-Hop", "Metal", "Indie", "Irish artists", "90s classics"]);
    }
  }
}

// === Event listeners ===
chatSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });

// === Init ===
(function() {
  addMessage("Hey there! I'm <strong>Bob</strong>, your personal music guide here at Round &amp; Round Records. Whether you're after a specific album, want to explore a new genre, or just fancy a chat about music: I'm your man.", 'bot');
  setTimeout(function() {
    addMessage("So, what are you into? Tell me an artist you love, a genre you're curious about, or even just a vibe, and I'll dig through the Spindizzy catalogue for you. Fire away!", 'bot');
    addSuggestions(["Radiohead", "Jazz", "Irish artists", "90s indie", "Heavy stuff", "Kim Deal"]);
  }, 1200);
})();
</script>
