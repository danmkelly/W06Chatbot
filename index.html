<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round & Round Records - Chat with Bob</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wood: #8B6914;
  --wood-dark: #5C440C;
  --cream: #FFF8E7;
  --ink: #1A1A1A;
  --ink-light: #333;
  --accent: #D44C2F;
  --accent-hover: #B33D24;
  --bubble-bot: #F0E8D8;
  --bubble-user: #1A1A1A;
  --subtle: #C4B896;
  --card-bg: #FFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 8px;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #F5F0E8;
  color: var(--ink);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--ink);
  color: var(--cream);
  padding: 0;
  border-bottom: 3px solid var(--accent);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.6rem;
  font-weight: bold;
  letter-spacing: 1px;
  color: var(--cream);
}
.logo-accent { color: var(--accent); }
.tagline { font-size: 0.8rem; color: var(--subtle); margin-left: 8px; }
.header-spacer { flex: 1; }
.badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Layout */
.main-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
  min-height: calc(100vh - 140px);
}

/* Chat Panel */
.chat-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid #E5DDD0;
}
.chat-header {
  background: var(--ink);
  color: var(--cream);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 1.2rem;
}
.chat-header-info h3 { font-size: 0.95rem; font-weight: 600; }
.chat-header-info p { font-size: 0.7rem; color: var(--subtle); margin-top: 2px; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: #FCFAF5;
  min-height: 480px;
  max-height: calc(100vh - 320px);
}
.msg {
  max-width: 82%;
  line-height: 1.5;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.9rem;
}
.msg.bot .msg-bubble { background: var(--bubble-bot); color: var(--ink); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
.msg-meta { font-size: 0.65rem; color: #999; margin-top: 4px; padding: 0 4px; }
.msg.user .msg-meta { text-align: right; }

.typing-indicator {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--subtle);
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.chat-suggestions {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 0;
}
.chat-suggestion {
  background: #fff; border: 1px solid #DDD4C4; color: var(--ink-light);
  padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
  transition: all 0.15s;
}
.chat-suggestion:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid #E5DDD0;
  display: flex; gap: 10px;
  background: #fff;
}
.chat-input {
  flex: 1;
  border: 2px solid #E5DDD0;
  border-radius: 24px;
  padding: 10px 18px;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.chat-send:hover { background: var(--accent-hover); }

/* Picks Panel */
.picks-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #E5DDD0;
  display: flex;
  flex-direction: column;
}
.picks-header {
  background: var(--wood);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}
.picks-count {
  background: rgba(255,255,255,0.25);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.7rem;
  margin-left: auto;
}
.picks-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  align-content: start;
  max-height: calc(100vh - 320px);
}
.picks-empty {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--subtle);
  padding: 40px 20px;
  font-size: 0.85rem;
  line-height: 1.6;
}
.picks-empty-icon { font-size: 2rem; margin-bottom: 8px; }

.artist-card {
  background: #FCFAF5;
  border-radius: 6px;
  padding: 12px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid #EEE8DA;
  display: flex;
  align-items: center;
  gap: 10px;
}
.artist-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.artist-card-rank {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--subtle);
  min-width: 20px;
}
.artist-card-info { flex: 1; }
.artist-card-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 3px;
}
.artist-card-tags {
  font-size: 0.65rem;
  color: var(--subtle);
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.artist-card-tag {
  background: #EEE8DA;
  padding: 1px 6px;
  border-radius: 8px;
  white-space: nowrap;
}
.artist-card-match {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}
.artist-card-badge {
  font-size: 0.55rem;
  background: #D44C2F;
  color: #fff;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
}

/* Footer */
.footer {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px;
  text-align: center;
  color: var(--subtle);
  font-size: 0.75rem;
  border-top: 1px solid #E5DDD0;
}
.footer a { color: var(--wood); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Mobile */
@media (max-width: 860px) {
  .main-wrap { grid-template-columns: 1fr; }
  .picks-panel { order: 3; max-height: none; }
  .picks-grid { max-height: 360px; }
  .chat-messages { min-height: 360px; max-height: 400px; }
}
@media (max-width: 500px) {
  .header-inner { padding: 10px 14px; }
  .main-wrap { padding: 12px; }
  .logo { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <span class="logo">ROUND <span class="logo-accent">&amp;</span> ROUND RECORDS</span>
    <span class="tagline">Your personal music guides since 2005</span>
    <span class="header-spacer"></span>
    <span class="badge">Now Chatting</span>
  </div>
</header>

<div class="main-wrap">

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-avatar">B</div>
      <div class="chat-header-info">
        <h3>Bob <span id="bobMode" style="font-size:0.6rem;background:#555;color:#fff;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:400;">basic</span></h3>
        <p>Music guide &amp; crate-digger</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Ask Bob anything about music..." autofocus>
      <button class="chat-send" id="chatSend" aria-label="Send">&#10148;</button>
    </div>
  </div>

  <div class="picks-panel" id="picksPanel">
    <div class="picks-header">
      &#9835; Bob's Picks <span class="picks-count" id="picksCount">0</span>
    </div>
    <div class="picks-grid" id="picksGrid">
      <div class="picks-empty">
        <div class="picks-empty-icon">&#128218;</div>
        <p>Tell Bob what you're into and he'll suggest similar artists right here.</p>
      </div>
    </div>
  </div>

</div>

<footer class="footer">
  Powered by <a href="https://www.last.fm" target="_blank">Last.fm</a> &bull; 32 Market Arcade, Dublin
  <span style="margin-left:8px;font-size:0.65rem;cursor:pointer;text-decoration:underline;" onclick="var k=prompt('Paste your new DeepSeek API key (leave blank to disable LLM):',localStorage.getItem('rr_llm_key')||'');if(k!==null){var ck=k.trim();if(ck){localStorage.setItem('rr_llm_key',ck);localStorage.setItem('rr_llm_url','https://api.deepseek.com/v1/chat/completions');localStorage.setItem('rr_llm_model','deepseek-chat')}else{localStorage.removeItem('rr_llm_key');localStorage.removeItem('rr_llm_url');localStorage.removeItem('rr_llm_model')}location.reload()}">LLM key</span>
  <span style="margin-left:6px;font-size:0.65rem;cursor:pointer;text-decoration:underline;" onclick="var k=prompt('Paste your Last.fm API key (free at last.fm/api):',localStorage.getItem('rr_lfm_key')||'');if(k!==null){var ck=k.trim();if(ck){localStorage.setItem('rr_lfm_key',ck)}else{localStorage.removeItem('rr_lfm_key')}location.reload()}">Last.fm key</span>
</footer>

<script src="config.js"></script>
<script>
(function() {
  if (typeof LLM_KEY === "undefined") window.LLM_KEY = "";
  if (typeof LLM_URL === "undefined") window.LLM_URL = "";
  if (typeof LLM_MODEL === "undefined") window.LLM_MODEL = "";
  if (typeof LFM_KEY === "undefined") window.LFM_KEY = "";

  if (!LLM_KEY && localStorage.getItem("rr_llm_key")) {
    LLM_KEY = localStorage.getItem("rr_llm_key");
    LLM_URL = localStorage.getItem("rr_llm_url") || "https://api.deepseek.com/v1/chat/completions";
    LLM_MODEL = localStorage.getItem("rr_llm_model") || "deepseek-chat";
  }
  if (!LFM_KEY && localStorage.getItem("rr_lfm_key")) {
    LFM_KEY = localStorage.getItem("rr_lfm_key");
  }

  if (!LLM_KEY) {
    setTimeout(function() {
      var key = prompt(
        "Hi! Bob is smarter with an LLM behind him.\n\n" +
        "Paste your DeepSeek API key to enable it, or\n" +
        "leave blank to use the built-in engine.\n\n" +
        "Get a free key at: platform.deepseek.com",
        ""
      );
      if (key && key.trim()) {
        var cleanKey = key.trim();
        LLM_KEY = cleanKey;
        LLM_URL = "https://api.deepseek.com/v1/chat/completions";
        LLM_MODEL = "deepseek-chat";
        localStorage.setItem("rr_llm_key", cleanKey);
        localStorage.setItem("rr_llm_url", LLM_URL);
        localStorage.setItem("rr_llm_model", LLM_MODEL);
        location.reload();
      }
    }, 500);
  }
  if (LLM_KEY && !LLM_URL) LLM_URL = "https://api.deepseek.com/v1/chat/completions";
  if (LLM_KEY && !LLM_MODEL) LLM_MODEL = "deepseek-chat";
})();

// === State ===
let conversationHistory = [];
let picks = [];
let lastQuery = "";

// === DOM ===
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');
const picksGrid = document.getElementById('picksGrid');
const picksCount = document.getElementById('picksCount');

// === Helpers ===
function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = '<div class="msg-bubble">' + text + '</div><div class="msg-meta">' + (sender === 'bot' ? 'Bob' : 'You') + ' &middot; ' + time + '</div>';
  chatMessages.appendChild(div);
  scrollChat();
}

function addSuggestions(suggestions) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="chat-suggestions">' + suggestions.map(s => '<span class="chat-suggestion" onclick="quickAsk(\'' + s.replace(/'/g, "\\'") + '\')">' + s + '</span>').join('') + '</div>';
  chatMessages.appendChild(div);
  scrollChat();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = '<div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  div.id = 'typingMsg';
  chatMessages.appendChild(div);
  scrollChat();
}

function hideTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function quickAsk(text) {
  chatInput.value = text;
  sendMessage();
}

// === Last.fm API ===
async function searchLastFM_Artists(query) {
  if (!LFM_KEY) return [];
  try {
    var resp = await fetch("https://ws.audioscrobbler.com/2.0/?method=artist.search&artist=" + encodeURIComponent(query) + "&api_key=" + LFM_KEY + "&format=json&limit=6");
    if (!resp.ok) return [];
    var data = await resp.json();
    if (data.results && data.results.artistmatches && data.results.artistmatches.artist) {
      return data.results.artistmatches.artist.map(function(a) { return { name: a.name }; });
    }
    return [];
  } catch (e) { console.warn("Last.fm search:", e.message); return []; }
}

async function getLastFM_SimilarArtists(artistName) {
  if (!LFM_KEY) return [];
  try {
    var resp = await fetch("https://ws.audioscrobbler.com/2.0/?method=artist.getsimilar&artist=" + encodeURIComponent(artistName) + "&api_key=" + LFM_KEY + "&format=json&limit=10");
    if (!resp.ok) return [];
    var data = await resp.json();
    if (data.similarartists && data.similarartists.artist) {
      return data.similarartists.artist.map(function(a) { return { name: a.name, match: parseFloat(a.match) }; });
    }
    return [];
  } catch (e) { console.warn("Last.fm similar:", e.message); return []; }
}

async function getLastFM_ArtistTags(artistName) {
  if (!LFM_KEY) return [];
  try {
    var resp = await fetch("https://ws.audioscrobbler.com/2.0/?method=artist.gettoptags&artist=" + encodeURIComponent(artistName) + "&api_key=" + LFM_KEY + "&format=json&limit=8");
    if (!resp.ok) return [];
    var data = await resp.json();
    if (data.toptags && data.toptags.tag) {
      return data.toptags.tag.map(function(t) { return { name: t.name, count: parseInt(t.count) }; });
    }
    return [];
  } catch (e) { console.warn("Last.fm tags:", e.message); return []; }
}

// === Pick management ===
function renderPicks() {
  picksGrid.innerHTML = '';
  picksCount.textContent = picks.length;
  if (picks.length === 0) {
    picksGrid.innerHTML = '<div class="picks-empty"><div class="picks-empty-icon">&#128218;</div><p>Tell Bob what you\'re into and he\'ll suggest similar artists right here.</p></div>';
    return;
  }
  picks.forEach(function(a, i) {
    var card = document.createElement('div');
    card.className = 'artist-card';
    card.onclick = function() {
      chatInput.value = a.name;
      sendMessage();
    };
    var matchHtml = a.match ? '<span class="artist-card-match">' + Math.round(a.match) + '%</span>' : '';
    var tagsHtml = a.tags && a.tags.length > 0
      ? '<div class="artist-card-tags">' + a.tags.slice(0, 4).map(function(t) { return '<span class="artist-card-tag">' + t.name + '</span>'; }).join('') + '</div>'
      : '';
    card.innerHTML =
      '<span class="artist-card-rank">' + (i + 1) + '.</span>' +
      '<div class="artist-card-info">' +
        '<div class="artist-card-name">' + a.name + '</div>' +
        tagsHtml +
      '</div>' +
      matchHtml;
    picksGrid.appendChild(card);
  });
}

// === Refinement detection ===
var REFINE_AUGMENT = ["more like", "similar", "what else", "show more", "any more", "more of", "deeper cuts"];

function detectIntent(text) {
  if (picks.length === 0) return "new";
  var t = text.toLowerCase().trim();
  if (/^(scratch|forget|reset|clear|new search|start over|different|something else)$/i.test(t)) return "new";
  if (REFINE_AUGMENT.some(function(a) { return t.indexOf(a) > -1; })) return "refine_augment";
  return "new";
}

// === Extract a clean artist name from natural language ===
function extractArtistName(text) {
  var t = text.toLowerCase().replace(/[.,!?;:'"()]/g, " ").trim();
  // Remove common lead-in phrases
  t = t.replace(/^(i |we )?(really |kinda |sort of |pretty )?(like|love|enjoy|adore|rate|dig|fancy|into |fan of |listening to )/i, "");
  t = t.replace(/^(what('s| is) (similar to|like) |suggest |recommend |find me |show me |search for )/i, "");
  // Take the first 1-3 meaningful words as the artist
  var words = t.split(/\s+/).filter(function(w) { return w.length > 1; });
  return words.slice(0, 3).join(" ");
}

// === Call the LLM ===
async function callLLM(userMessage, artistName, similarArtists, tags) {
  if (!LLM_KEY || !LLM_URL || !LLM_MODEL) return null;

  var lfmContext = "";
  if (similarArtists && similarArtists.length > 0) {
    lfmContext = "LAST.FM DATA for \"" + artistName + "\":\n";
    lfmContext += "Similar artists: " + similarArtists.map(function(a) { return a.name + " (" + Math.round(a.match) + "% match)"; }).join(", ") + "\n";
    if (tags && tags.length > 0) {
      lfmContext += "Genre tags: " + tags.map(function(t) { return t.name; }).join(", ") + "\n";
    }
    lfmContext += "Use this data to suggest genuinely related artists. Mention specific names and why they connect. The customer sees these in Bob's Picks.\n";
  }

  var systemPrompt = [
    "You are Bob, a super friendly, super knowledgeable music guru working at Round & Round Records, a beloved independent record shop in Dublin, Ireland (est. 2005). You live and breathe music. Your knowledge spans the entire history of recorded music: every genre, every era, every scene.",
    "",
    "YOUR PERSONALITY:",
    "- Warm, passionate, the kind of person who can talk for an hour about why a certain B-side is underrated.",
    "- Dublin/Irish flavour: use 'grand', 'deadly', 'class', 'sound', 'give it a lash', 'craic' naturally but sparingly.",
    "- Opinions matter. 'Best album of last month? For my money, it's gotta be...' With reasons.",
    "- Enthusiasm is infectious. If someone mentions a band you love: 'Ah no way, you're into them? Deadly!'",
    "- Never corporate. Never robotic. You're having a chat about music, not reading a script.",
    "",
    "HOW YOU RESPOND:",
    "- Lead with your knowledge. Dive into the conversation. Share stories, context, opinions.",
    "- When someone says they like an artist: share what you know about them, then suggest 2-3 genuinely similar artists and explain WHY they connect (shared genre, era, scene, producer, label, influence).",
    "- Use the Last.fm data provided to suggest similar artists. Mention specific names and match context.",
    "- Think broadly. Connect dots. 'If you like X, you'd probably love Y because they share the same producer during that era...'",
    "- Mention how many similar artists appeared in Bob's Picks: 'I've lined up 10 similar acts in Bob's Picks for you...'",
    "- Keep it warm and natural. 2-6 sentences usually, go longer if the story deserves it.",
    "- No em dashes. Use commas, colons, or full stops.",
    "",
    "SHOP CONTEXT (use organically, don't lead with it):",
    "- Round & Round Records, 32 Market Arcade, Dublin. Independent since 2005.",
    "- We use Last.fm's massive music database to power our recommendations.",
    "- Free shipping in Ireland on orders over EUR 75. Worldwide delivery.",
    "",
    "TODAY'S DATE: " + new Date().getDate() + " " + ["January","February","March","April","May","June","July","August","September","October","November","December"][new Date().getMonth()] + " " + new Date().getFullYear(),
    "",
    lfmContext
  ].join("\n");

  var messages = [{ role: "system", content: systemPrompt }];
  for (var i = 0; i < conversationHistory.length; i++) {
    messages.push(conversationHistory[i]);
  }
  messages.push({ role: "user", content: userMessage });

  try {
    console.log("[Bob] Calling LLM with model:", LLM_MODEL, "lfmData:", !!similarArtists && similarArtists.length);
    var resp = await fetch(LLM_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + LLM_KEY },
      body: JSON.stringify({ model: LLM_MODEL, messages: messages, temperature: 0.85, max_tokens: 500 })
    });
    if (!resp.ok) {
      var errText = await resp.text();
      console.error("[Bob] LLM API error:", resp.status, errText.slice(0, 200));
      throw new Error("API error: " + resp.status);
    }
    var data = await resp.json();
    var reply = data.choices[0].message.content.trim();
    console.log("[Bob] LLM reply:", reply.slice(0, 150));
    conversationHistory.push({ role: "user", content: userMessage });
    conversationHistory.push({ role: "assistant", content: reply });
    if (conversationHistory.length > 12) conversationHistory = conversationHistory.slice(-12);
    return reply;
  } catch (e) {
    console.warn("[Bob] LLM call failed:", e.message);
    return null;
  }
}

// === Main send ===
async function sendMessage() {
  var text = chatInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  chatInput.value = '';
  showTyping();

  var intent = detectIntent(text);

  // Refinement: "show more", "similar", "deeper cuts" etc.
  if (intent === "refine_augment" && lastQuery) {
    var moreSimilar = await getLastFM_SimilarArtists(lastQuery);
    if (moreSimilar.length > 0) {
      picks = moreSimilar;
      renderPicks();
      hideTyping();
      addMessage("Here are " + picks.length + " similar artists based on what you asked before. Click any name to explore further!", 'bot');
      return;
    }
  }

  // New query: search Last.fm
  var artistName = extractArtistName(text);
  if (!artistName || artistName.length < 2) {
    hideTyping();
    addMessage("I need a bit more to go on! Give me an artist name and I'll find you similar acts in a flash.", 'bot');
    addSuggestions(["Radiohead", "Pixies", "Kendrick Lamar", "Miles Davis", "Aphex Twin", "Daft Punk"]);
    return;
  }

  lastQuery = artistName;
  picks = [];
  renderPicks();

  var similarArtists = await getLastFM_SimilarArtists(artistName);
  var tags = await getLastFM_ArtistTags(artistName);

  if (similarArtists.length === 0) {
    hideTyping();
    var found = await searchLastFM_Artists(artistName);
    if (found.length > 0) {
      picks = found;
      renderPicks();
      addMessage("Didn't find direct similars for \"" + artistName + "\", but here are some matching artists from Last.fm. Click one to explore!", 'bot');
    } else {
      addMessage("Hmm, Last.fm didn't return anything for \"" + artistName + "\". Could you try a different artist name?", 'bot');
      addSuggestions(["Radiohead", "Pixies", "Kendrick Lamar", "Miles Davis", "Daft Punk"]);
    }
    return;
  }

  // Enrich picks with tags (fetch tags for top 3 similar artists)
  picks = similarArtists;
  picks.forEach(function(a) { a.tags = []; });
  if (tags && tags.length > 0) picks[0].tags = tags;
  // Fetch tags for top 2-3 similar artists
  for (var i = 1; i < Math.min(4, picks.length); i++) {
    var t = await getLastFM_ArtistTags(picks[i].name);
    if (t && t.length > 0) picks[i].tags = t;
  }
  renderPicks();

  // Call LLM
  var llmReply = null;
  if (LLM_KEY && LLM_URL && LLM_MODEL) {
    llmReply = await callLLM(text, artistName, similarArtists, tags);
  }

  hideTyping();

  if (llmReply) {
    addMessage(llmReply, 'bot');
  } else {
    var topPick = similarArtists[0];
    var topPicksStr = similarArtists.slice(0, 3).map(function(a) { return a.name; }).join(", ");
    addMessage("Deadly! If you're into " + artistName + ", you'd probably love " + topPicksStr + ". " + topPick.name + " is the closest match at " + Math.round(topPick.match) + "%. Check Bob's Picks for the full list and click any name to explore further!", 'bot');
  }
}

// === Event listeners ===
chatSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });

// === Init ===
(function() {
  var badge = document.getElementById("bobMode");
  if (LLM_KEY && LLM_URL && LLM_MODEL) {
    badge.textContent = "LLM";
    badge.style.background = "#2E7D32";
  } else {
    badge.textContent = "basic";
    badge.style.background = "#555";
  }

  addMessage("Hey there! I'm <strong>Bob</strong>, your personal music guide here at Round &amp; Round Records. Powered by Last.fm's massive music database, I can find you similar artists, suggest deep cuts, and chat about pretty much any genre or era.", 'bot');
  setTimeout(function() {
    addMessage("Tell me an artist you love and I'll suggest similar acts you might enjoy. Fire away!", 'bot');
    addSuggestions(["Radiohead", "Pixies", "Kendrick Lamar", "Miles Davis", "Aphex Twin", "Daft Punk"]);
  }, 1200);
})();
</script>
