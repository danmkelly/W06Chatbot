<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round & Round Records - Chat with Bob</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wood: #8B6914;
  --wood-dark: #5C440C;
  --cream: #FFF8E7;
  --ink: #1A1A1A;
  --ink-light: #333;
  --accent: #D44C2F;
  --accent-hover: #B33D24;
  --bubble-bot: #F0E8D8;
  --bubble-user: #1A1A1A;
  --subtle: #C4B896;
  --card-bg: #FFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 8px;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #F5F0E8;
  color: var(--ink);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--ink);
  color: var(--cream);
  padding: 0;
  border-bottom: 3px solid var(--accent);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1.6rem;
  font-weight: bold;
  letter-spacing: 1px;
  color: var(--cream);
}
.logo-accent { color: var(--accent); }
.tagline { font-size: 0.8rem; color: var(--subtle); margin-left: 8px; }
.header-spacer { flex: 1; }
.badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.7rem;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Layout */
.main-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
  min-height: calc(100vh - 140px);
}

/* Chat Panel */
.chat-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border: 1px solid #E5DDD0;
}
.chat-header {
  background: var(--ink);
  color: var(--cream);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: 1.2rem;
}
.chat-header-info h3 { font-size: 0.95rem; font-weight: 600; }
.chat-header-info p { font-size: 0.7rem; color: var(--subtle); margin-top: 2px; }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: #FCFAF5;
  min-height: 480px;
  max-height: calc(100vh - 320px);
}
.msg {
  max-width: 82%;
  line-height: 1.5;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.9rem;
}
.msg.bot .msg-bubble { background: var(--bubble-bot); color: var(--ink); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
.msg-meta { font-size: 0.65rem; color: #999; margin-top: 4px; padding: 0 4px; }
.msg.user .msg-meta { text-align: right; }

.typing-indicator {
  display: flex; gap: 4px; padding: 8px 0;
}
.typing-indicator span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--subtle);
  animation: bounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.chat-suggestions {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 0;
}
.chat-suggestion {
  background: #fff; border: 1px solid #DDD4C4; color: var(--ink-light);
  padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;
  transition: all 0.15s;
}
.chat-suggestion:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid #E5DDD0;
  display: flex; gap: 10px;
  background: #fff;
}
.chat-input {
  flex: 1;
  border: 2px solid #E5DDD0;
  border-radius: 24px;
  padding: 10px 18px;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.chat-send:hover { background: var(--accent-hover); }

/* Picks Panel */
.picks-panel {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid #E5DDD0;
  display: flex;
  flex-direction: column;
}
.picks-header {
  background: var(--wood);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.5px;
}
.picks-count {
  background: rgba(255,255,255,0.25);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 0.7rem;
  margin-left: auto;
}
.picks-grid {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  align-content: start;
  max-height: calc(100vh - 320px);
}
.picks-empty {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--subtle);
  padding: 40px 20px;
  font-size: 0.85rem;
  line-height: 1.6;
}
.picks-empty-icon { font-size: 2rem; margin-bottom: 8px; }

.product-card {
  background: #FCFAF5;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  border: 1px solid #EEE8DA;
  display: flex;
  flex-direction: column;
}
.product-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.product-card-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  background: #E8E0D0;
  display: block;
}
.product-card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; }
.product-card-artist {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 2px;
  line-height: 1.2;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-title {
  font-size: 0.78rem;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
}
.product-card-price {
  font-weight: 700;
  font-size: 0.85rem;
  color: var(--ink);
}
.product-card-format {
  font-size: 0.6rem;
  background: var(--ink);
  color: #fff;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Footer */
.footer {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 24px;
  text-align: center;
  color: var(--subtle);
  font-size: 0.75rem;
  border-top: 1px solid #E5DDD0;
}
.footer a { color: var(--wood); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* Mobile */
@media (max-width: 860px) {
  .main-wrap {
    grid-template-columns: 1fr;
  }
  .picks-panel {
    order: 3;
    max-height: none;
  }
  .picks-grid {
    grid-template-columns: 1fr 1fr 1fr;
    max-height: 360px;
  }
  .chat-messages { min-height: 360px; max-height: 400px; }
}
@media (max-width: 500px) {
  .picks-grid { grid-template-columns: 1fr 1fr; }
  .header-inner { padding: 10px 14px; }
  .main-wrap { padding: 12px; }
  .logo { font-size: 1.3rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <span class="logo">ROUND <span class="logo-accent">&amp;</span> ROUND RECORDS</span>
    <span class="tagline">Your personal music guides since 2005</span>
    <span class="header-spacer"></span>
    <span class="badge">Now Chatting</span>
  </div>
</header>

<div class="main-wrap">

  <!-- Chat Panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <div class="chat-avatar">B</div>
      <div class="chat-header-info">
        <h3>Bob <span id="bobMode" style="font-size:0.6rem;background:#555;color:#fff;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:400;">basic</span></h3>

</div>

<footer class="footer">
  Powered by <a href="https://spindizzyrecords.com" target="_blank">Spindizzy</a> &amp; <a href="https://www.discogs.com" target="_blank">Discogs</a> &amp; <a href="https://www.last.fm" target="_blank">Last.fm</a> &bull; 32 Market Arcade, Dublin
  <span style="margin-left:8px;font-size:0.65rem;cursor:pointer;text-decoration:underline;" onclick="var k=prompt('Paste your new DeepSeek API key (leave blank to disable LLM):',localStorage.getItem('rr_llm_key')||'');if(k!==null){var ck=k.trim();if(ck){localStorage.setItem('rr_llm_key',ck);localStorage.setItem('rr_llm_url','https://api.deepseek.com/v1/chat/completions');localStorage.setItem('rr_llm_model','deepseek-chat')}else{localStorage.removeItem('rr_llm_key');localStorage.removeItem('rr_llm_url');localStorage.removeItem('rr_llm_model')}location.reload()}">LLM key</span>
  <span style="margin-left:6px;font-size:0.65rem;cursor:pointer;text-decoration:underline;" onclick="var k=prompt('Paste your Discogs token:',localStorage.getItem('rr_dgs_key')||'');if(k!==null){var ck=k.trim();if(ck){localStorage.setItem('rr_dgs_key',ck)}else{localStorage.removeItem('rr_dgs_key')}location.reload()}">Discogs</span>
  <span style="margin-left:6px;font-size:0.65rem;cursor:pointer;text-decoration:underline;" onclick="var k=prompt('Paste your Last.fm API key (free at last.fm/api):',localStorage.getItem('rr_lfm_key')||'');if(k!==null){var ck=k.trim();if(ck){localStorage.setItem('rr_lfm_key',ck)}else{localStorage.removeItem('rr_lfm_key')}location.reload()}">Last.fm</span>
</footer>

<script src="config.js"></script>
<script>
// === LLM key setup (for hosted deployment where config.js is not deployed) ===
(function() {
  if (typeof LLM_KEY === "undefined") window.LLM_KEY = "";
  if (typeof LLM_URL === "undefined") window.LLM_URL = "";
  if (typeof LLM_MODEL === "undefined") window.LLM_MODEL = "";
  if (typeof DGS_KEY === "undefined") window.DGS_KEY = "";
  if (typeof LFM_KEY === "undefined") window.LFM_KEY = "";

  // If config.js didn't provide keys, try localStorage
  if (!LLM_KEY && localStorage.getItem("rr_llm_key")) {
    LLM_KEY = localStorage.getItem("rr_llm_key");
    LLM_URL = localStorage.getItem("rr_llm_url") || "https://api.deepseek.com/v1/chat/completions";
    LLM_MODEL = localStorage.getItem("rr_llm_model") || "deepseek-chat";
  }
  if (!DGS_KEY && localStorage.getItem("rr_dgs_key")) {
    DGS_KEY = localStorage.getItem("rr_dgs_key");
  }
  if (!LFM_KEY && localStorage.getItem("rr_lfm_key")) {
    LFM_KEY = localStorage.getItem("rr_lfm_key");
  }

  // Prompt for key on first visit (no config.js, no localStorage)
  if (!LLM_KEY) {
    setTimeout(function() {
      var key = prompt(
        "Hi! Bob is smarter with an LLM behind him.\n\n" +
        "Paste your DeepSeek API key to enable it, or\n" +
        "leave blank to use the built-in engine.\n\n" +
        "Get a free key at: platform.deepseek.com",
        ""
      );
      if (key && key.trim()) {
        var cleanKey = key.trim();
        LLM_KEY = cleanKey;
        LLM_URL = "https://api.deepseek.com/v1/chat/completions";
        LLM_MODEL = "deepseek-chat";
        localStorage.setItem("rr_llm_key", cleanKey);
        localStorage.setItem("rr_llm_url", LLM_URL);
        localStorage.setItem("rr_llm_model", LLM_MODEL);
        location.reload();
      }
    }, 500);
  }
  // If key came from localStorage but models are undefined, set defaults
  if (LLM_KEY && !LLM_URL) LLM_URL = "https://api.deepseek.com/v1/chat/completions";
  if (LLM_KEY && !LLM_MODEL) LLM_MODEL = "deepseek-chat";
})();

// === Conversation history (for LLM context) ===
let conversationHistory = [];

// === Build a rich catalogue listing for the LLM system prompt ===
function buildCatalogueListing() {
  var lines = ["SPINDIZZY RECORDS CURRENT STOCK (" + catalogue.length + " items in our catalogue right now):"];
  catalogue.forEach(function(p) {
    var genreStr = p.genres.slice(0, 3).join("/");
    lines.push("- " + p.artist + " | " + p.title + " | " + p.format + " | EUR " + p.price + " | " + genreStr + " | " + p.era);
  });
  return lines.join("\n");
}

// === Build music knowledge for the LLM (artist connections, genre context) ===
function buildMusicKnowledge() {
  return [
    "YOUR MUSIC KNOWLEDGE (you know far more than just what's in our shop):",
    "",
    "You have deep knowledge across all genres and eras. Here are reference points, but think beyond them:",
    "",
    "Key artist connections and stories:",
    "- Kim Deal: bassist/vocalist in Pixies (Surfer Rosa, Doolittle), then formed The Breeders (Last Splash, Pod), side project The Amps (Pacer). Also worked with Guided By Voices.",
    "- Radiohead: evolved from 90s alt-rock (The Bends, OK Computer) to experimental/electronic (Kid A, Amnesiac) to later masterworks (In Rainbows, A Moon Shaped Pool). Thom Yorke's solo work (The Eraser, Anima) and Atoms for Peace side project. Jonny Greenwood's film scores.",
    "- Joy Division: Unknown Pleasures (1979) and Closer (1980) defined post-punk. After Ian Curtis died, remaining members formed New Order, pioneering dance-rock fusion through the 80s/90s.",
    "- 90s Alternative: Nirvana, Pearl Jam, Smashing Pumpkins, Pavement, Sonic Youth, My Bloody Valentine, Slowdive, Ride, The Verve, Portishead, Massive Attack, Bjork, PJ Harvey, Beck.",
    "- Classic Rock: Led Zeppelin, Pink Floyd, The Beatles, The Rolling Stones, The Who, David Bowie, Bob Dylan, Neil Young, Jimi Hendrix, The Doors, Fleetwood Mac, Queen.",
    "- Soul/Funk/Disco: Marvin Gaye, Stevie Wonder, Aretha Franklin, James Brown, Parliament/Funkadelic, Curtis Mayfield, Chic, Earth Wind & Fire, Prince, Sly & The Family Stone.",
    "- Hip-Hop: 2Pac, Biggie, Nas, Jay-Z, Wu-Tang Clan, A Tribe Called Quest, OutKast, Kendrick Lamar, MF DOOM, J Dilla, The Roots, Public Enemy.",
    "- Electronic: Aphex Twin, Boards of Canada, Kraftwerk, Daft Punk, Brian Eno, Four Tet, Burial, Flying Lotus, Autechre, The Chemical Brothers, Orbital.",
    "- Jazz essentials: Miles Davis (Kind of Blue, Bitches Brew), John Coltrane (A Love Supreme), Herbie Hancock (Head Hunters, Maiden Voyage), Thelonious Monk, Charles Mingus, Bill Evans, Chet Baker, Art Blakey.",
    "- Irish music: Damien Dempsey, Glen Hansard/The Frames, U2, Thin Lizzy, My Bloody Valentine, Fontaines D.C., Sinead O'Connor, Van Morrison, The Pogues, Hozier.",
    "",
    "You can discuss ANY artist, ANY album, ANY era. The catalogue below is just what we happen to have on the shelf right now, not the limit of your knowledge.",
    "",
    "Shop context (use naturally, don't lead with it):",
    "- R&R Records, 32 Market Arcade, Dublin. Independent shop est. 2005.",
    "- Free shipping in Ireland on orders over EUR 75. Worldwide delivery.",
    "- We love Record Store Day, limited pressings, coloured vinyl.",
    "- Spindizzy Records is our main supplier catalogue."
  ].join("\n");
}

// === Build recent release context for the LLM ===
function buildRecentContext() {
  var today = new Date();
  var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var dateStr = today.getDate() + " " + monthNames[today.getMonth()] + " " + today.getFullYear();
  var newItems = catalogue.filter(function(p) {
    var t = (p.title + " " + p.genres.join(" ")).toLowerCase();
    return t.indexOf("2026") > -1 || t.indexOf("reissue") > -1;
  });
  var lines = ["TODAY'S DATE: " + dateStr];
  lines.push("");
  lines.push("RECENT & UPCOMING RELEASES (from our catalogue, newest first):");
  if (newItems.length > 0) {
    newItems.slice(0, 12).forEach(function(p) {
      lines.push("- " + p.artist + " - " + p.title + " (" + p.format + ", EUR " + p.price + ")");
    });
  }
  lines.push("");
  lines.push("NOTE: New releases drop every Friday. Use your general music knowledge to discuss recent albums broadly. Only claim something is IN STOCK if it appears in the FULL CATALOGUE below.");
  return lines.join("\n");
}

// === Call the LLM with rich context ===
async function callLLM(userMessage, searchResult, lastfmEnrichment) {
  if (!LLM_KEY || !LLM_URL || !LLM_MODEL) return null;

  var systemPrompt = [
    "You are Bob, a music guru who happens to work at Round & Round Records, a beloved independent record shop in Dublin, Ireland (est. 2005). Your primary identity is MUSIC EXPERT. You live and breathe music: you follow new releases, you know band histories inside out, you have strong opinions, you read the music press, you go to gigs. The shop is your day job because you love connecting people with great records, not the other way around.",
    "",
    "YOUR PERSONALITY:",
    "- Warm, passionate, the kind of person who can talk for an hour about why a certain B-side is underrated.",
    "- Dublin/Irish flavour: use 'grand', 'deadly', 'class', 'sound', 'give it a lash', 'craic' naturally but sparingly.",
    "- Opinions matter. 'Best album of last month? For my money, it's gotta be...' With reasons.",
    "- Enthusiasm is infectious. If someone mentions a band you love, get excited: 'Ah no way, you're into them? Deadly! You know they recorded that in...'",
    "- Be a walking music encyclopedia. The customer came for expertise. Give it to them generously.",
    "- Never corporate. Never robotic. You're having a chat about music, not reading a script.",
    "",
    "YOUR DEFAULT STANCE: MUSIC GURU FIRST",
    "- Lead with your knowledge. Dive into the conversation. Share stories, context, opinions.",
    "- Reference ANY artist, ANY album, ANY era. Your knowledge spans the entire history of recorded music.",
    "- Discuss releases not in the shop. Say 'Ah we don't stock that one at the moment unfortunately, but...' then keep the conversation going with your knowledge.",
    "- If you don't know something: be honest, say 'That's a great question actually, I'd want to check that properly...' and share what you do know.",
    "- Think broadly. Connect dots. 'If you like X, you'd probably love Y because...'",
    "",
    "SECONDARY: IF YOU WANT TO MENTION OUR STOCK",
    "- Only when it feels natural: 'Actually, we've got a gorgeous pressing of that on the shelf right now...'",
    "- IF search results are provided below, casually mention 1-2 of the best matches. Don't list everything.",
    "- Point to 'Bob's Picks on the right' for the full list. Don't repeat it in chat.",
    "- NEVER claim an album is in stock unless it appears in the STOCK LIST below. That's the only thing you must be strict about.",
    "",
    "WHEN SOMEONE SAYS THEY LIKE AN ARTIST (taste statement):",
    "- This is a conversation opener, not a search query. Share your knowledge about that artist: their best albums, their history, who they influenced, who they were influenced by, similar artists.",
    "- Then broaden out: 'If you're into X, you'd probably love Y and Z because...' Give reasons. Connect dots.",
    "- Mentioning stock is optional and organic, not required. The Picks panel has already shown them the artist's albums.",
    "",
    "CONVERSATION RULES:",
    "- Keep it warm and natural. 2-6 sentences usually, but go long if the story deserves it.",
    "- No em dashes. Use commas, colons, or full stops.",
    "- Don't lead with the catalogue. Lead with music. Let the stock mention be organic, not forced.",
    "- If the search results include items from DIFFERENT genres (taste/recommendation query), discuss the breadth: 'I've pulled some from the same world...'",
    "",
    buildRecentContext(),
    "",
    buildMusicKnowledge(),
    "",
    "STOCK LIST (what's actually on our shelves - for reference only, don't lead with this):",
    buildCatalogueListing(),
    "",
    lastfmEnrichment || "",
    lastfmEnrichment ? "" : "",
    searchResult && searchResult.results && searchResult.results.length > 0
      ? (searchResult.isTaste
          ? "THIS IS A TASTE STATEMENT. The customer said they like an artist. SEARCH RESULTS (" + searchResult.results.length + " items, showing the artist's albums + genre-related picks):\n" + searchResult.results.map(function(r, i) { return (i+1) + ". " + r.artist + " - " + r.title + " (" + r.format + ", EUR " + r.price + ")"; }).join("\n") + "\n\nIMPORTANT: Share your music knowledge about this artist and similar artists. Mention 2-3 similar acts they might like. Only mention 1-2 stock items organically if it fits. The Picks panel already shows everything."
          : "SEARCH RESULTS (" + searchResult.results.length + " matches on our shelves):\n" + searchResult.results.map(function(r, i) { return (i+1) + ". " + r.artist + " - " + r.title + " (" + r.format + ", EUR " + r.price + ")"; }).join("\n") + "\n\nIf it feels natural, mention 1-2 of these in your response.")
      : "NO MATCHES on our shelves for this query. Share your general music knowledge freely. If you think of related artists we might stock, check the STOCK LIST above."
  ].join("\n");

  var messages = [{ role: "system", content: systemPrompt }];
  for (var i = 0; i < conversationHistory.length; i++) {
    messages.push(conversationHistory[i]);
  }
  messages.push({ role: "user", content: userMessage });

  try {
    console.log("[Bob] Calling LLM with model:", LLM_MODEL, "msg length:", userMessage.length);
    var resp = await fetch(LLM_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + LLM_KEY },
      body: JSON.stringify({ model: LLM_MODEL, messages: messages, temperature: 0.85, max_tokens: 500 })
    });
    if (!resp.ok) {
      var errText = await resp.text();
      console.error("[Bob] LLM API error:", resp.status, errText.slice(0, 200));
      throw new Error("API error: " + resp.status);
    }
    var data = await resp.json();
    var reply = data.choices[0].message.content.trim();
    console.log("[Bob] LLM reply:", reply.slice(0, 150));
    conversationHistory.push({ role: "user", content: userMessage });
    conversationHistory.push({ role: "assistant", content: reply });
    if (conversationHistory.length > 12) conversationHistory = conversationHistory.slice(-12);
    return reply;
  } catch (e) {
    console.warn("[Bob] LLM call failed, falling back to rule-based:", e.message);
    return null;
  }
}

// === Search ===
// === Smart search: tokenize natural language into search terms ===
var STOP_WORDS = ["i","me","my","we","our","you","your","he","she","it","they","them","a","an","the","is","are","was","were","be","been","have","has","had","do","does","did","can","could","will","would","should","may","might","shall","to","of","in","for","on","with","at","by","from","about","as","into","through","during","before","after","above","below","up","down","out","off","over","under","again","further","then","once","here","there","when","where","why","how","all","both","each","few","more","most","other","some","such","no","nor","not","only","own","same","so","than","too","very","just","really","like","love","want","looking","find","help","know","think","search","need","please","what","else","any","got","get","that","this","these","those","which"];

function extractSearchTerms(text) {
  var clean = text.toLowerCase().replace(/[.,!?;:'"()]/g, " ");
  var words = clean.split(/\s+/).filter(function(w) { return w.length > 1 && STOP_WORDS.indexOf(w) === -1; });
  // Also try bigrams for multi-word artist names
  var bigrams = [];
  for (var i = 0; i < words.length - 1; i++) {
    bigrams.push(words[i] + " " + words[i + 1]);
  }
  var terms = words.concat(bigrams);
  // Prioritize longer terms (more specific) and deduplicate
  var seen = {};
  var unique = [];
  terms.forEach(function(t) {
    if (!seen[t]) { seen[t] = true; unique.push(t); }
  });
  unique.sort(function(a, b) { return b.length - a.length; });
  return unique;
}

function searchCatalogue(query) {
  var terms = extractSearchTerms(query);
  var results = [];
  catalogue.forEach(function(p) {
    var score = 0;
    var a = p.artist.toLowerCase();
    var t = p.title.toLowerCase();
    var g = p.genres.join(" ").toLowerCase();
    var matched = {};
    terms.forEach(function(term) {
      if (matched[term]) return;
      if (a.indexOf(term) > -1) { score += 20; matched[term] = true; }
      if (t.indexOf(term) > -1) { score += 5; matched[term] = true; }
      if (g.indexOf(term) > -1) { score += 3; matched[term] = true; }
      if (p.era === term || (term === "80s" && p.era === "80s") || (term === "90s" && p.era === "90s") || (term === "70s" && p.era === "70s") || (term === "60s" && p.era === "60s") || (term === "00s" && p.era === "00s") || (term === "10s" && p.era === "10s") || (term === "20s" && p.era === "20s")) { score += 4; matched[term] = true; }
    });
    if (score > 0) results.push({ product: p, score: score });
  });
  results.sort(function(a, b) { return b.score - a.score; });
  return results.slice(0, 8).map(function(r) { return r.product; });
}

// === Check if query is a recommendation/adjacency request ===
function isRecommendationQuery(text) {
  var t = text.toLowerCase();
  return /what else|similar to|like (them|this|that)|recommend|suggest|what (other|else)|bands like|artists like|if i like|into.*what else/.test(t);
}

// === Detect taste statements: "I like X", "I love X", "I'm into X" ===
function isTasteStatement(text) {
  var t = text.toLowerCase().replace(/[.,!?]/g, "").trim();
  return /^(i|we) (really |absolutely |kinda |sort of |kinda |pretty )?(like|love|enjoy|adore|rate|dig|fancy|into) /i.test(t) ||
         /^(my|our) favo(u?)rite (band|artist|group|music|sound|genre|style|album) is /i.test(t) ||
         /^(i'm|i am|we're|we are) (a |such a )?(big |huge |massive )?fan of /i.test(t) ||
         /^(i'm|i am|we're|we are) (really |pretty |quite )?into /i.test(t) ||
         /^(i) (fancy|dig|rate|adore|love) /i.test(t) ||
         /^(been|been really) (into|loving|enjoying|listening to) /i.test(t);
}

// === Extract artist names from recommendation queries ===
function extractArtistsFromQuery(text) {
  var clean = text.toLowerCase().replace(/[.,!?;:'"()]/g, " ");
  // Known artist patterns from catalogue
  var found = [];
  catalogue.forEach(function(p) {
    var aname = p.artist.toLowerCase();
    if (clean.indexOf(aname) > -1 && found.indexOf(p.artist) === -1) {
      found.push(p.artist);
    }
  });
  return found;
}

function searchByName(names) {
  var all = [];
  names.forEach(function(name) {
    var q = name.toLowerCase();
    catalogue.forEach(function(p) {
      if (p.artist.toLowerCase().indexOf(q) > -1 && all.indexOf(p) === -1) all.push(p);
    });
  });
  return all.slice(0, 8);
}

// === Discogs search (fallback when not in Spindizzy catalogue) ===
async function searchDiscogs(query) {
  if (!DGS_KEY) return [];
  // For recommendation queries, extract artist names for Discogs
  var searchTerms = extractSearchTerms(query).slice(0, 3).join(" ");
  if (!searchTerms || searchTerms.length < 2) searchTerms = query;
  try {
    var resp = await fetch("https://api.discogs.com/database/search?q=" + encodeURIComponent(searchTerms) + "&type=release&per_page=8&token=" + DGS_KEY);
    if (!resp.ok) throw new Error("Discogs API error: " + resp.status);
    var data = await resp.json();
    if (!data.results || data.results.length === 0) return [];
    return data.results.map(function(r) {
      var artists = [];
      if (r.title) {
        var parts = r.title.split(" - ");
        if (parts.length > 1) artists = [parts[0].trim()];
      }
      return {
        artist: artists.length > 0 ? artists[0] : (r.title || "Unknown"),
        title: r.title || "Unknown release",
        price: "check site",
        format: (r.format || ["Vinyl"])[0],
        img: r.cover_image || r.thumb || "",
        genres: (r.genre || ["music"]),
        era: r.year ? (r.year.slice(0, 3) + "s") : "",
        url: "https://www.discogs.com" + (r.uri || "/search/?q=" + encodeURIComponent(query)),
        source: "discogs"
      };
    });
  } catch (e) {
    console.warn("Discogs search failed:", e.message);
    return [];
  }
}

// === Last.fm enrichment: similar artists, genre tags ===
async function getLastFM_SimilarArtists(artistName) {

    if (!resp.ok) return [];
    var data = await resp.json();
    if (data.similarartists && data.similarartists.artist) {
      return data.similarartists.artist.map(function(a) { return { name: a.name, match: parseFloat(a.match) }; });
    }
    return [];

async function getLastFM_ArtistTags(artistName) {

    if (!resp.ok) return [];
    var data = await resp.json();
    if (data.toptags && data.toptags.tag) {

    }

  } catch (e) { console.warn("Last.fm tags:", e.message); return []; }
}

function buildLastFMContext(similarArtists, tags, artistName) {
  var lines = ["LAST.FM ENRICHMENT for " + artistName + ":"];
  if (similarArtists && similarArtists.length > 0) {
    lines.push("Similar artists: " + similarArtists.map(function(a) { return a.name + " (" + a.match + "% match)"; }).join(", "));
  }
  if (tags && tags.length > 0) {
    lines.push("Genre tags: " + tags.map(function(t) { return t.name; }).join(", "));
  }
  lines.push("Use this to sound knowledgeable. Suggest similar artists from this list. Cross-reference with stock to mention any we actually carry.");
  return lines.join("\n");
}
// === Conversation engine ===
function getSearchResults(userInput) {
  var text = userInput.trim();
  var textLower = text.toLowerCase();

  // Check special knowledge maps for search expansions
  for (var key in knowledge) {
    if (knowledge.hasOwnProperty(key) && textLower.indexOf(key) > -1) {
      var searches = knowledge[key].searches;
      if (searches && searches.length > 0) {
        var found = searchByName(searches);
        return { knowledgeHit: knowledge[key], results: found };
      }
    }
  }

  // Check special knowledge response-only (no search expansion)
  for (var k in knowledge) {
    if (knowledge.hasOwnProperty(k) && textLower.indexOf(k) > -1) {
      return { knowledgeHit: knowledge[k], results: [] };
    }
  }

  // Taste statements: "I like Pixies", "I'm into Radiohead", "I love jazz"
  if (isTasteStatement(text)) {
    var artists = extractArtistsFromQuery(text);
    if (artists.length > 0) {
      var direct = searchByName(artists);
      var allGenres = [];
      direct.forEach(function(p) { allGenres = allGenres.concat(p.genres); });
      var uniqueGenres = [];
      allGenres.forEach(function(g) { if (uniqueGenres.indexOf(g) === -1) uniqueGenres.push(g); });
      var genreResults = [];
      uniqueGenres.forEach(function(g) {
        var matches = searchByName([g]);
        matches.forEach(function(m) {
          if (genreResults.indexOf(m) === -1 && direct.indexOf(m) === -1) genreResults.push(m);
        });
      });
      var combined = direct.concat(genreResults).slice(0, 12);
      var genreNames = uniqueGenres.join(", ");
      var respText = "Ah, " + artists.join(" and ") + "! Deadly taste. " + (artists.length === 1 ? artists[0] + " are" : artists.join(" and ") + " are") + " absolute legends. I've pulled what we have from " + (artists.length === 1 ? "them" : "them") + " in our catalogue, plus some bits from the " + genreNames + " space you might fancy. Have a gander at Bob's Picks!";
      return { knowledgeHit: { response: respText }, results: combined, isRecommendation: true, isTaste: true };
    }
  }

  // Recommendation queries: "what else is like them?", "similar to X"
  if (isRecommendationQuery(text)) {
    var artists = extractArtistsFromQuery(text);
    if (artists.length > 0) {
      // Show the artists they mentioned, plus related from catalogue
      var direct = searchByName(artists);
      // Also do a broad search for similar genres
      var allGenres = [];
      direct.forEach(function(p) { allGenres = allGenres.concat(p.genres); });
      var uniqueGenres = [];
      allGenres.forEach(function(g) { if (uniqueGenres.indexOf(g) === -1) uniqueGenres.push(g); });
      var genreResults = [];
      uniqueGenres.forEach(function(g) {
        var matches = searchByName([g]);
        matches.forEach(function(m) {
          if (genreResults.indexOf(m) === -1) genreResults.push(m);
        });
      });
      var combined = direct.concat(genreResults).slice(0, 8);
      return { knowledgeHit: { response: "Ah, " + artists.join(" and ") + "! Deadly taste. Here's what I found: the stuff you mentioned, plus some other bits from the same sort of world. Check Bob's Picks!" }, results: combined, isRecommendation: true };
    }
  }

  // General catalogue search
  return { knowledgeHit: null, results: searchCatalogue(text) };
}

function formatResultMessage(results) {
  if (results.length === 0) return null;
  var artistMap = {};
  results.forEach(function(r) { artistMap[r.artist] = true; });
  var artistCount = Object.keys(artistMap).length;
  return results.length === 1
    ? "Found 1 match in the Spindizzy catalogue:"
    : "Found " + results.length + " matches across " + artistCount + " artist" + (artistCount > 1 ? "s" : "") + ":";
}

function showResults(searchResult) {

      addSuggestions(["New releases", "Rock classics", "Jazz essentials", "Electronic & dance", "Irish artists"]);

// === Refinement detection: is this a follow-up filter or a new query? ===
var REFINE_FORMATS = ["vinyl", "cd", "lp", "7\"", "12\"", "vinyl only", "just vinyl", "just cd", "cd only", "only vinyl", "only cd", "vinyls"];
var REFINE_PRICES = ["cheap", "cheaper", "bargain", "affordable", "expensive", "under", "over", "around"];
var REFINE_ERAS = ["newer", "newest", "older", "oldest", "latest", "recent", "classic", "vintage", "modern", "70s", "80s", "90s", "00s", "10s", "20s", "60s", "50s"];
var REFINE_AUGMENT = ["more like", "similar to", "similar", "what about", "also like", "any more", "more of", "show more", "what else like"];

function detectIntent(text) {
  if (picks.length === 0) return "new";
  var t = text.toLowerCase().trim();

  // Explicit new-search signals
  if (/^(scratch|forget|reset|clear|new search|start over|different|something else|change)$/i.test(t)) return "new";

  // Refinement signals: single-word or short format/price/era filter
  var words = t.split(/\s+/);

  // Format filter: "just vinyl", "vinyl only", "cd", etc.
  if (REFINE_FORMATS.indexOf(t) > -1 || (words.length <= 2 && REFINE_FORMATS.some(function(f) { return t.indexOf(f) > -1; }))) {
    return "refine_format";
  }

  // Price filter: "under 20", "cheap", "bargain", etc.
  if (REFINE_PRICES.some(function(p) { return t.indexOf(p) === 0 || words.indexOf(p) > -1; }) && words.length <= 4) {
    return "refine_price";
  }

  // Era filter: "newer", "90s", "classic" etc.
  if (REFINE_ERAS.some(function(e) { return words.indexOf(e) > -1; }) && words.length <= 3 && !isRecommendationQuery(text)) {
    return "refine_era";
  }

  // Augmentation: "more like this", "similar", "what about X"
  if (REFINE_AUGMENT.some(function(a) { return t.indexOf(a) > -1; }) && !isRecommendationQuery(text)) {
    return "refine_augment";
  }

  // Genre filter: if the query is a genre in our existing picks, treat as filter
  if (words.length <= 2) {
    var existingGenres = [];
    picks.forEach(function(p) { existingGenres = existingGenres.concat(p.genres); });
    var uniqueGenres = [];
    existingGenres.forEach(function(g) { if (uniqueGenres.indexOf(g) === -1) uniqueGenres.push(g); });
    if (uniqueGenres.indexOf(t) > -1 || uniqueGenres.some(function(g) { return words.indexOf(g) > -1; })) {
      return "refine_genre";
    }
  }

  // If query is short and we have picks, check if it's an artist already in picks
  if (words.length <= 3) {
    var inPicks = picks.some(function(p) {
      return p.artist.toLowerCase().indexOf(t) > -1 || t.indexOf(p.artist.toLowerCase()) > -1;
    });
    if (inPicks) return "refine_artist";
  }

  return "new";
}

function filterPicks(intent, text) {
  var t = text.toLowerCase().trim();
  var filtered = picks.slice();

  if (intent === "refine_format") {
    var fmt = t;
    if (t.indexOf("vinyl") > -1) fmt = "vinyl";
    if (t.indexOf("cd") > -1) fmt = "cd";
    filtered = filtered.filter(function(p) { return p.format.toLowerCase().indexOf(fmt) > -1; });
    return { filtered: filtered, msg: "Narrowed to " + fmt.toUpperCase() + " only. " + filtered.length + " pick" + (filtered.length !== 1 ? "s" : "") + "." };
  }

  if (intent === "refine_price") {
    var maxPrice = Infinity;
    var match = t.match(/(\d+)/);
    if (match) maxPrice = parseInt(match[1]);
    if (t.indexOf("over") > -1 || t.indexOf("expensive") > -1) {
      filtered = filtered.filter(function(p) { return parseFloat(p.price) >= maxPrice; });
      return { filtered: filtered, msg: "Showing pricier picks (EUR " + maxPrice + "+). " + filtered.length + " pick" + (filtered.length !== 1 ? "s" : "") + "." };
    }
    filtered = filtered.filter(function(p) { return parseFloat(p.price) <= maxPrice; });
    return { filtered: filtered, msg: "Showing picks under EUR " + maxPrice + ". " + filtered.length + " pick" + (filtered.length !== 1 ? "s" : "") + "." };
  }

  if (intent === "refine_era") {
    var era = t;
    if (t === "newer" || t === "newest" || t === "latest" || t === "recent" || t === "modern") {
      filtered = filtered.filter(function(p) { return ["20s", "10s"].indexOf(p.era) > -1; });
    } else if (t === "older" || t === "oldest" || t === "classic" || t === "vintage") {
      filtered = filtered.filter(function(p) { return ["50s", "60s", "70s", "80s"].indexOf(p.era) > -1; });
    } else {
      filtered = filtered.filter(function(p) { return p.era === era; });
    }
    return { filtered: filtered, msg: "Filtered to " + era + " era. " + filtered.length + " pick" + (filtered.length !== 1 ? "s" : "") + "." };
  }

  if (intent === "refine_genre") {
    filtered = filtered.filter(function(p) { return p.genres.indexOf(t) > -1 || p.genres.some(function(g) { return t.indexOf(g) > -1; }); });
    return { filtered: filtered, msg: "Filtered to " + t + ". " + filtered.length + " pick" + (filtered.length !== 1 ? "s" : "") + "." };
  }

  if (intent === "refine_artist") {
    filtered = filtered.filter(function(p) { return p.artist.toLowerCase().indexOf(t) > -1 || t.indexOf(p.artist.toLowerCase()) > -1; });
    return { filtered: filtered, msg: "Filtered to " + t + ". " + filtered.length + " pick" + (filtered.length !== 1 ? "s" : "") + "." };
  }

  if (intent === "refine_augment") {
    // For "more like this", augment with additional genre-related items
    var allGenres = [];
    picks.forEach(function(p) { allGenres = allGenres.concat(p.genres); });
    var uniqueGenres = [];
    allGenres.forEach(function(g) { if (uniqueGenres.indexOf(g) === -1) uniqueGenres.push(g); });
    var extra = [];
    catalogue.forEach(function(p) {
      var alreadyInPicks = picks.some(function(pk) { return pk.artist === p.artist && pk.title === p.title; });
      if (!alreadyInPicks && p.genres.some(function(g) { return uniqueGenres.indexOf(g) > -1; })) {
        extra.push(p);
      }
    });
    picks = picks.concat(extra.slice(0, 8));
    renderPicks();
    return { filtered: picks, msg: "Added " + Math.min(extra.length, 8) + " more from similar genres. " + picks.length + " total picks now.", augmented: true };
  }

  return { filtered: filtered, msg: null };
}

// === Main send ===
async function sendMessage() {
  var text = chatInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  chatInput.value = '';
  showTyping();

  var intent = detectIntent(text);
  var isRefine = intent !== "new";

  // --- REFINEMENT PATH: filter existing picks ---
  if (isRefine) {
    var result = filterPicks(intent, text);
    if (result.augmented) {
      // Already rendered in filterPicks
    } else {
      picks = result.filtered;
      renderPicks();
    }

    // Call LLM with refinement context if available
    var refineMsg = result.msg || "Here are your refined picks.";
    var llmReply = null;
    if (LLM_KEY && LLM_URL && LLM_MODEL) {
      var refineContext = {
        knowledgeHit: null,
        results: picks.slice(0, 12),
        isRefinement: true,
        refinementType: intent,
        previousQuery: lastQuery
      };
      // Fetch Last.fm enrichment for refinement too
      var lfmCtx2 = null;
      if (LFM_KEY && lastQuery && picks.length > 0) {
        var artistFromLast = extractArtistsFromQuery(lastQuery);
        if (artistFromLast.length > 0) {
          var sim2 = await getLastFM_SimilarArtists(artistFromLast[0]);
          var tags2 = await getLastFM_ArtistTags(artistFromLast[0]);
          if (sim2.length > 0 || tags2.length > 0) {
            lfmCtx2 = buildLastFMContext(sim2, tags2, artistFromLast[0]);
          }
        }
      }
      llmReply = await callLLM(text, refineContext, lfmCtx2);
    }

    hideTyping();

    if (llmReply) {
      addMessage(llmReply, 'bot');
    } else {
      addMessage(refineMsg + " Check Bob's Picks on the right.", 'bot');
    }
    lastQuery = text;
    return;
  }

  // --- NEW QUERY PATH: fresh search ---
  // Clear previous picks
  picks = [];
  renderPicks();

  // Run catalogue search immediately (fast, no dependency on LLM)
  var searchResult = getSearchResults(text);

  // For recommendation queries, also search Discogs in parallel for broader results
  var dgsPromise = null;
  if (isRecommendationQuery(text) && DGS_KEY) {
    dgsPromise = searchDiscogs(text);
  }

  // If nothing in Spindizzy, try Discogs as fallback
  if ((!searchResult.results || searchResult.results.length === 0) && DGS_KEY) {
    var dgsResults = dgsPromise ? await dgsPromise : await searchDiscogs(text);
    if (dgsResults.length > 0) {
      searchResult.results = (searchResult.results || []).concat(dgsResults);
      searchResult.source = "discogs";
    }
  } else if (dgsPromise) {
    // Recommendation query with Spindizzy results: merge Discogs results too
    var dgsExtra = await dgsPromise;
    if (dgsExtra.length > 0) {
      searchResult.results = searchResult.results.concat(dgsExtra).slice(0, 12);
    }
  }

  var llmReply = null;
  if (LLM_KEY && LLM_URL && LLM_MODEL) {
    // Fetch Last.fm enrichment for taste/recommendation queries
    var lfmCtx = null;
    if (LFM_KEY && (searchResult.isTaste || searchResult.isRecommendation)) {
      var artists = extractArtistsFromQuery(text);
      if (artists.length > 0) {
        var similar = await getLastFM_SimilarArtists(artists[0]);
        var tags = await getLastFM_ArtistTags(artists[0]);
        if (similar.length > 0 || tags.length > 0) {
          lfmCtx = buildLastFMContext(similar, tags, artists[0]);
        }
      }
    }
    llmReply = await callLLM(text, searchResult, lfmCtx);
  }

  hideTyping();

  var hasResults = searchResult.results && searchResult.results.length > 0;
  var isDiscogs = searchResult.source === "discogs";

  // Store for potential refinement
  lastQuery = text;
  lastSearchResults = searchResult.results || [];

  if (llmReply) {
    addMessage(llmReply, 'bot');
    showResults(searchResult);
    if (!hasResults) {
      addSuggestions(["Jazz", "Rock", "Electronic", "Hip-Hop", "Metal", "Indie", "Irish artists", "90s classics"]);
    }
  } else {
    // Fallback to rule-based engine
    if (searchResult.knowledgeHit && searchResult.knowledgeHit.response) {
      addMessage(searchResult.knowledgeHit.response, 'bot');
      showResults(searchResult);
    } else if (hasResults) {
      showResults(searchResult);
      if (isDiscogs) {
        addMessage("Nothing in Spindizzy for that, so I checked Discogs. Found " + searchResult.results.length + " match" + (searchResult.results.length > 1 ? "es" : "") + "! Have a look at Bob's Picks.", 'bot');
      } else {
        var artistMap = {};
        searchResult.results.forEach(function(r) { artistMap[r.artist] = true; });
        var artistCount = Object.keys(artistMap).length;
        var msg = searchResult.results.length === 1
          ? "Got one for you!"
          : "Nice one! Found " + searchResult.results.length + " matches across " + artistCount + " artist" + (artistCount > 1 ? "s" : "") + ".";
        addMessage(msg + " Take a look at Bob's Picks on the right. Anything catch your eye?", 'bot');
      }
      addSuggestions(["New releases", "Rock classics", "Jazz essentials", "Electronic & dance", "Irish artists"]);
    } else {
      addMessage("Hmm, nothing in Spindizzy or Discogs for \"" + text + "\". Could you try a different artist, genre, or style? I'm here to dig!", 'bot');
      addSuggestions(["Jazz", "Rock", "Electronic", "Hip-Hop", "Metal", "Indie", "Irish artists", "90s classics"]);
    }
  }
}

// === Event listeners ===
chatSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });

// === Init ===
(function() {
  // Set mode badge
  var badge = document.getElementById("bobMode");
  if (LLM_KEY && LLM_URL && LLM_MODEL) {
    badge.textContent = "LLM";
    badge.style.background = "#2E7D32";
  } else {
    badge.textContent = "basic";
    badge.style.background = "#555";
  }

  addMessage("Hey there! I'm <strong>Bob</strong>, your personal music guide here at Round &amp; Round Records. Whether you're after a specific album, want to explore a new genre, or just fancy a chat about music: I'm your man.", 'bot');
  setTimeout(function() {
    addMessage("So, what are you into? Tell me an artist you love, a genre you're curious about, or even just a vibe, and I'll dig through the Spindizzy catalogue for you. Fire away!", 'bot');
    addSuggestions(["Radiohead", "Jazz", "Irish artists", "90s indie", "Heavy stuff", "Kim Deal"]);
  }, 1200);
})();
</script>
