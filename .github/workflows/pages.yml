name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Copy site files
        run: |
          mkdir -p _site
          cp -r *.html *.js *.md *.txt *.toml *.yml *.css _headers _config.yml .nojekyll robots.txt _site/ 2>/dev/null || true
          cp -r KeelinOSullivan.md _site/ 2>/dev/null || true
          touch _site/.nojekyll
          ls -la _site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
