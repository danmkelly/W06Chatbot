name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Cancel in-progress deployments when a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build static site
        run: |
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='.wrangler' --exclude='node_modules' --exclude='_site' --exclude='*.jpg' --exclude='*.png' ./ _site/
          echo "=== Checking deployed files ==="
          ls -la _site/index.html _site/victor.html _site/_headers _site/robots.txt _site/.nojekyll _site/_config.yml 2>&1
          echo "=== _headers content ==="
          cat _site/_headers 2>/dev/null || echo "MISSING"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
